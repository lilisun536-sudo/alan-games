<!-- 20260701_游戏_走迷宫_v1 -->
<!-- 放仓库根目录。进度键前缀 alan_game_maze_ ;最好星级写入 alan_game_maze_stars(计入顶栏合计) -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#7A4FD0">
<title>走迷宫 · Maze</title>
<style>
  :root{ --ink:#1B2A4A; --paper:#FFFFFF; --game:#7A4FD0; --game-dark:#6A3FC0; --sun:#FFC233; --go:#4CAF6D; --shadow:0 6px 0 rgba(27,42,74,.12); }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif;color:var(--ink);background:linear-gradient(180deg,#EDE7FB 0%,#F4F0FF 45%,#FFF9EC 100%);min-height:100vh;-webkit-user-select:none;user-select:none;}
  a{color:inherit;text-decoration:none;}
  .topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--game);color:#fff;font-size:23px;font-weight:800;}
  .topbar .home-btn{color:#fff;background:rgba(255,255,255,.20);border:none;padding:8px 16px;border-radius:14px;font-size:18px;font-weight:800;white-space:nowrap;text-decoration:none;cursor:pointer;font-family:inherit;}
  .topbar .home-btn:active{transform:translateY(1px);}
  .topbar .logo{font-size:26px;line-height:1;}
  .topbar .room{flex:1;line-height:1.1;}
  .topbar .room small{display:block;font-size:14px;font-weight:600;opacity:.85;margin-top:2px;}
  .topbar .best{background:rgba(255,255,255,.18);padding:8px 14px;border-radius:14px;font-size:18px;white-space:nowrap;font-weight:800;}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 40px;}
  .hint{text-align:center;font-size:16px;font-weight:700;color:var(--game);opacity:.85;margin:2px 0 12px;}
  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;margin:0 4px 14px;}
  .seg{display:flex;background:#fff;border:3px solid var(--game);border-radius:14px;overflow:hidden;}
  .seg button{border:none;background:transparent;padding:8px 15px;font-size:16px;font-weight:800;color:var(--game);cursor:pointer;font-family:inherit;}
  .seg button.on{background:var(--game);color:#fff;}
  .pill{background:#fff;border:3px solid rgba(27,42,74,.12);border-radius:14px;padding:8px 14px;font-size:16px;font-weight:800;white-space:nowrap;}
  .restart{background:var(--sun);border:none;border-radius:14px;padding:9px 16px;font-size:16px;font-weight:800;cursor:pointer;color:#5A4300;font-family:inherit;}

  .maze{display:grid;aspect-ratio:1;grid-auto-rows:1fr;max-width:440px;margin:0 auto;background:#fff;border-top:3px solid var(--ink);border-left:3px solid var(--ink);border-radius:6px;overflow:hidden;}
  .cell{display:flex;align-items:center;justify-content:center;font-size:clamp(15px,5vw,26px);}
  .cell.wr{border-right:3px solid var(--ink);}
  .cell.wb{border-bottom:3px solid var(--ink);}

  /* 方向键 */
  .dpad{display:grid;grid-template-columns:repeat(3,64px);grid-template-rows:repeat(3,64px);gap:8px;justify-content:center;margin:18px auto 0;}
  .dpad button{border:none;border-radius:16px;background:var(--game);color:#fff;font-size:28px;font-weight:800;cursor:pointer;box-shadow:0 5px 0 var(--game-dark);font-family:inherit;}
  .dpad button:active{transform:translateY(3px);box-shadow:none;}
  .dpad .up{grid-area:1/2/2/3;} .dpad .left{grid-area:2/1/3/2;} .dpad .right{grid-area:2/3/3/4;} .dpad .down{grid-area:3/2/4/3;}

  .overlay{position:fixed;inset:0;background:rgba(27,42,74,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;}
  .win{background:#fff;border-radius:28px;padding:30px 26px;max-width:420px;width:100%;text-align:center;box-shadow:0 10px 0 rgba(27,42,74,.18);border:6px solid var(--game);}
  .win .stars{font-size:56px;letter-spacing:6px;line-height:1;animation:pop .5s;}
  .win h2{margin:14px 0 4px;font-size:30px;}
  .win .sub{font-size:19px;opacity:.6;}
  .win .stat{font-size:19px;opacity:.8;margin:10px 0 0;}
  .win .best-line{margin-top:10px;font-size:17px;font-weight:800;color:#B07A00;background:#FFF3CF;border-radius:14px;padding:8px 14px;display:inline-block;}
  .win .best-line.newrec{color:#2F7A47;background:#EAF8EE;}
  .win .btns{display:flex;gap:12px;justify-content:center;margin-top:22px;flex-wrap:wrap;}
  .win .btn-again{font-size:19px;font-weight:800;border:none;border-radius:16px;padding:12px 22px;cursor:pointer;background:var(--go);color:#fff;box-shadow:0 5px 0 #2F7A47;font-family:inherit;}
  .win .btn-again:active{transform:translateY(3px);box-shadow:none;}
  .win .btn-back{font-size:19px;font-weight:800;border-radius:16px;padding:12px 22px;background:#fff;color:var(--ink);border:4px solid var(--game);text-decoration:none;}
  @keyframes pop{0%{transform:scale(.5)}60%{transform:scale(1.18)}100%{transform:scale(1)}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  @media(max-width:720px){ .topbar{font-size:19px}.topbar .room small{font-size:12px} }
</style>
</head>
<body>
  <div class="topbar">
    <a class="home-btn" href="games.html">← 返回</a>
    <span class="logo">🐭</span>
    <span class="room">走迷宫<small>Maze</small></span>
    <span class="best" id="bestPill">🏆 —</span>
  </div>

  <div class="wrap">
    <div class="hint">用方向键或下方按钮,带 🐭 走到 🧀 · Guide the mouse to the cheese!</div>
    <div class="controls">
      <div class="seg">
        <button id="segS" class="on">小</button>
        <button id="segL">大</button>
      </div>
      <span class="pill" id="steps">👣 0 步</span>
      <span class="pill" id="time">⏱️ 0:00</span>
      <button class="restart" id="restart">🔄 重玩</button>
    </div>
    <div class="maze" id="maze"></div>
    <div class="dpad">
      <button class="up"    id="up"    aria-label="上">▲</button>
      <button class="left"  id="left"  aria-label="左">◀</button>
      <button class="right" id="right" aria-label="右">▶</button>
      <button class="down"  id="down"  aria-label="下">▼</button>
    </div>
  </div>

<script>
var N=7, maze=[], divs=[], pr=0, pc=0, goalR=6, goalC=6, steps=0, started=false, t0=0, timer=null, won=false, finishSec=0, level=7;

function $(id){ return document.getElementById(id); }
function cell(r,c){ return maze[r][c]; }
function fmt(s){ var m=Math.floor(s/60), ss=s%60; return m+':'+(ss<10?'0':'')+ss; }

/* ---- 迷宫生成(递归回溯,迭代实现)---- */
function genMaze(n){
  N=n; maze=[];
  for(var r=0;r<N;r++){ var row=[]; for(var c=0;c<N;c++){ row.push({wr:true,wb:true,v:false}); } maze.push(row); }
  var stack=[[0,0]]; maze[0][0].v=true;
  while(stack.length){
    var t=stack[stack.length-1], r=t[0], c=t[1], opts=[];
    if(r>0 && !maze[r-1][c].v) opts.push('U');
    if(r<N-1 && !maze[r+1][c].v) opts.push('D');
    if(c>0 && !maze[r][c-1].v) opts.push('L');
    if(c<N-1 && !maze[r][c+1].v) opts.push('R');
    if(!opts.length){ stack.pop(); continue; }
    var d=opts[Math.floor(Math.random()*opts.length)];
    if(d==='U'){ maze[r-1][c].wb=false; maze[r-1][c].v=true; stack.push([r-1,c]); }
    else if(d==='D'){ maze[r][c].wb=false; maze[r+1][c].v=true; stack.push([r+1,c]); }
    else if(d==='L'){ maze[r][c-1].wr=false; maze[r][c-1].v=true; stack.push([r,c-1]); }
    else { maze[r][c].wr=false; maze[r][c+1].v=true; stack.push([r,c+1]); }
  }
}
/* ---- 最短路(BFS,用于判星)---- */
function shortest(){
  var dist=[]; for(var r=0;r<N;r++){ var a=[]; for(var c=0;c<N;c++) a.push(-1); dist.push(a); }
  var q=[[0,0]]; dist[0][0]=0;
  while(q.length){
    var cur=q.shift(), r=cur[0], c=cur[1], nb=[];
    if(r+1<N && !cell(r,c).wb) nb.push([r+1,c]);
    if(r-1>=0 && !cell(r-1,c).wb) nb.push([r-1,c]);
    if(c+1<N && !cell(r,c).wr) nb.push([r,c+1]);
    if(c-1>=0 && !cell(r,c-1).wr) nb.push([r,c-1]);
    for(var i=0;i<nb.length;i++){ var nr=nb[i][0], nc=nb[i][1]; if(dist[nr][nc]<0){ dist[nr][nc]=dist[r][c]+1; q.push([nr,nc]); } }
  }
  return dist[N-1][N-1];
}

/* ---- 渲染 ---- */
function setCellText(r,c){ divs[r][c].textContent = (r===pr&&c===pc)?'🐭':((r===goalR&&c===goalC)?'🧀':''); }
function render(){
  var g=$('maze'); g.innerHTML=''; g.style.gridTemplateColumns='repeat('+N+',1fr)'; divs=[];
  for(var r=0;r<N;r++){ var drow=[];
    for(var c=0;c<N;c++){
      var d=document.createElement('div');
      d.className='cell'+(maze[r][c].wr?' wr':'')+(maze[r][c].wb?' wb':'');
      d.textContent = (r===pr&&c===pc)?'🐭':((r===goalR&&c===goalC)?'🧀':'');
      g.appendChild(d); drow.push(d);
    } divs.push(drow);
  }
}

/* ---- 计时/计步 ---- */
function startTimer(){ t0=Date.now(); timer=setInterval(function(){ updateTime(elapsed()); },500); }
function stopTimer(){ if(timer){ clearInterval(timer); timer=null; } }
function elapsed(){ return t0?Math.floor((Date.now()-t0)/1000):0; }
function updateTime(s){ var el=$('time'); if(el) el.textContent='⏱️ '+fmt(s); }
function updateSteps(){ var el=$('steps'); if(el) el.textContent='👣 '+steps+' 步'; }

/* ---- 最好记录 / 星级 ---- */
function getBest(){ try{ var o=JSON.parse(localStorage.getItem('alan_game_maze_best')); return (o&&typeof o==='object')?o:{}; }catch(e){ return {}; } }
function setBest(o){ try{ localStorage.setItem('alan_game_maze_best', JSON.stringify(o)); }catch(e){} }
function getStars(){ try{ return parseInt(localStorage.getItem('alan_game_maze_stars'),10)||0; }catch(e){ return 0; } }
function saveStars(s){ try{ if(s>getStars()) localStorage.setItem('alan_game_maze_stars', String(s)); }catch(e){} }
function updateBestPill(){ var s=getStars(); var el=$('bestPill'); if(el) el.textContent = s>0 ? ('🏆 '+'⭐'.repeat(s)) : '🏆 —'; }
function starsFor(opt, st){ if(st<=Math.ceil(opt*1.3)) return 3; if(st<=Math.ceil(opt*1.8)) return 2; return 1; }

/* ---- 移动 ---- */
function tryMove(dr,dc){
  if(won) return;
  var nr=pr+dr, nc=pc+dc;
  if(nr<0||nc<0||nr>=N||nc>=N) return;
  if(dr===0&&dc===1  && cell(pr,pc).wr) return;   // 右
  if(dr===0&&dc===-1 && cell(pr,nc).wr) return;   // 左(墙属于左格)
  if(dr===1&&dc===0  && cell(pr,pc).wb) return;   // 下
  if(dr===-1&&dc===0 && cell(nr,pc).wb) return;   // 上(墙属于上格)
  if(!started){ started=true; startTimer(); }
  var opr=pr, opc=pc; pr=nr; pc=nc; steps++; updateSteps();
  setCellText(opr,opc); setCellText(pr,pc);
  if(pr===goalR && pc===goalC) winGame();
}

/* ---- 胜利 ---- */
function winGame(){
  won=true; stopTimer(); finishSec=elapsed();
  var opt=shortest(); var st=starsFor(opt, steps); saveStars(st); updateBestPill();
  var all=getBest(), key=String(level), prev=all[key], isNew=false;
  if(!prev || steps<prev.steps || (steps===prev.steps && finishSec<prev.sec)){ all[key]={steps:steps, sec:finishSec}; setBest(all); isNew=true; prev=all[key]; }
  var bestTxt = isNew ? '🎉 新纪录！New best!' : ('最好 Best: '+prev.steps+' 步 · '+fmt(prev.sec));
  var ov=document.createElement('div'); ov.className='overlay'; ov.id='overlay';
  ov.innerHTML =
    '<div class="win">'+
      '<div class="stars">'+ ('⭐'.repeat(st)+'☆'.repeat(3-st)) +'</div>'+
      '<h2>到啦！<div class="sub">You made it!</div></h2>'+
      '<div class="stat">用了 '+steps+' 步 · '+fmt(finishSec)+'(最短 '+opt+' 步)</div>'+
      '<div class="best-line'+(isNew?' newrec':'')+'">'+bestTxt+'</div>'+
      '<div class="btns"><button class="btn-again" id="again">🔄 再玩一次</button><a class="btn-back" href="games.html">← 返回游戏</a></div>'+
    '</div>';
  document.body.appendChild(ov);
  var ag=$('again'); if(ag) ag.addEventListener('click', function(){ newGame(level); });
}

/* ---- 新一局 ---- */
function newGame(n){
  level=n; genMaze(n); pr=0; pc=0; goalR=N-1; goalC=N-1;
  steps=0; started=false; won=false; finishSec=0; stopTimer(); t0=0;
  updateSteps(); updateTime(0); updateBestPill();
  $('segS').classList.toggle('on', n===7);
  $('segL').classList.toggle('on', n===11);
  var ov=$('overlay'); if(ov) ov.parentNode.removeChild(ov);
  render();
}

/* ---- 事件 ---- */
$('up').addEventListener('click', function(){ tryMove(-1,0); });
$('down').addEventListener('click', function(){ tryMove(1,0); });
$('left').addEventListener('click', function(){ tryMove(0,-1); });
$('right').addEventListener('click', function(){ tryMove(0,1); });
$('segS').addEventListener('click', function(){ newGame(7); });
$('segL').addEventListener('click', function(){ newGame(11); });
$('restart').addEventListener('click', function(){ newGame(level); });
window.addEventListener('keydown', function(e){
  var k=e.key;
  if(k==='ArrowUp'||k==='w'||k==='W'){ tryMove(-1,0); e.preventDefault(); }
  else if(k==='ArrowDown'||k==='s'||k==='S'){ tryMove(1,0); e.preventDefault(); }
  else if(k==='ArrowLeft'||k==='a'||k==='A'){ tryMove(0,-1); e.preventDefault(); }
  else if(k==='ArrowRight'||k==='d'||k==='D'){ tryMove(0,1); e.preventDefault(); }
});

newGame(7);
</script>
</body>
</html>
