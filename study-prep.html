<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艾伦的登山大冒险 · 学前衔接课件 v5</title>
<style>
:root{
  --ink:#1B2A4A; --sky:#EAF5FF; --paper:#FFFFFF;
  --accent:#2563B8; --sun:#FFC233; --go:#4CAF6D; --no:#FF8A7A;
  --shadow:0 6px 0 rgba(27,42,74,.12);
  --radius:26px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif;
  color:var(--ink);
  background:linear-gradient(180deg,#D9EEFF 0%,#F2FAFF 45%,#FFF9EC 100%);
  min-height:100vh; user-select:none;
}
button{font-family:inherit;color:inherit;cursor:pointer;touch-action:manipulation;}

/* ---------- 顶栏 ---------- */
.topbar{
  display:flex;align-items:center;gap:14px;
  padding:14px 22px;background:var(--accent);color:#fff;
  font-size:24px;font-weight:700;
}
.topbar a{color:#fff;text-decoration:none;background:rgba(255,255,255,.18);
  padding:8px 16px;border-radius:14px;font-size:20px;white-space:nowrap;}
.topbar a:focus-visible,button:focus-visible{outline:4px solid var(--sun);outline-offset:2px;}
#mod-title{flex:1;text-align:center;letter-spacing:1px;}
#topstars{background:rgba(255,255,255,.18);padding:8px 16px;border-radius:14px;font-size:20px;white-space:nowrap;}

#stage{max-width:1060px;margin:0 auto;padding:20px 18px 60px;}

/* ---------- 选关菜单 ---------- */
.menu-head{display:flex;align-items:center;gap:18px;margin:8px 4px 18px;}
.mascot{font-size:72px;line-height:1;filter:drop-shadow(0 4px 0 rgba(27,42,74,.15));}
.menu-titles h1{margin:0;font-size:36px;}
.menu-titles .sub{margin:4px 0 0;font-size:22px;opacity:.75;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
.lesson-card{
  display:flex;flex-direction:column;align-items:flex-start;gap:6px;
  background:var(--paper);border:4px solid var(--accent);border-radius:var(--radius);
  padding:20px 22px;box-shadow:var(--shadow);text-align:left;transition:transform .12s;
}
.lesson-card:active{transform:scale(.97);}
.lc-icon{font-size:52px;line-height:1;}
.lc-name{font-size:28px;font-weight:800;}
.lc-sub{font-size:19px;opacity:.7;}
.lc-stars{font-size:20px;color:#B07A00;background:#FFF3CF;border-radius:12px;padding:4px 12px;margin-top:4px;}

/* ---------- 关卡内 ---------- */
.play-bar{display:flex;align-items:center;gap:14px;margin:6px 0 14px;}
.quit-btn{font-size:20px;border:3px solid var(--accent);background:#fff;border-radius:14px;padding:8px 16px;font-weight:700;}
.dots{flex:1;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.dot{width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid var(--accent);opacity:.45;}
.dot.done{background:var(--accent);opacity:1;}
.dot.now{background:var(--sun);border-color:#C9920A;opacity:1;transform:scale(1.25);}
.run-stars{font-size:22px;font-weight:800;color:#B07A00;background:#FFF3CF;border-radius:12px;padding:6px 14px;}

.screen{
  background:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow);
  border:4px solid rgba(27,42,74,.08);
  padding:28px 26px 34px;display:flex;flex-direction:column;align-items:center;gap:18px;
  min-height:430px;justify-content:center;position:relative;
}
.eyebrow{font-size:20px;font-weight:700;color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,#fff);
  padding:6px 18px;border-radius:999px;}
.teach-card{display:flex;flex-direction:column;align-items:center;gap:12px;}
.t-emoji{font-size:96px;line-height:1.15;text-align:center;}
.t-emoji.big{font-size:120px;}
.t-big{font-size:120px;font-weight:800;line-height:1.1;text-align:center;}
.t-big.hanzi{font-family:"KaiTi","STKaiti","Microsoft YaHei",serif;font-size:140px;font-weight:400;}
.t-big.letter{font-family:"Comic Sans MS","Segoe UI",sans-serif;font-size:130px;color:var(--accent);}
.t-big.phrase{font-family:"Comic Sans MS","Segoe UI",sans-serif;font-size:46px;color:var(--accent);max-width:760px;}
.t-pinyin{font-size:40px;color:#7A4FD0;font-weight:700;letter-spacing:2px;}
.t-cap{font-size:28px;text-align:center;max-width:740px;line-height:1.5;}
.speak-btn{
  font-size:26px;font-weight:800;color:#fff;background:var(--accent);
  border:none;border-radius:18px;padding:14px 28px;box-shadow:var(--shadow);
}
.speak-btn.big{font-size:30px;padding:18px 34px;}
.speak-btn:active{transform:translateY(3px);}

.q-title{font-size:32px;font-weight:800;text-align:center;line-height:1.4;max-width:860px;}

.opt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;width:100%;max-width:880px;}
.opt{
  min-height:120px;background:#fff;border:5px solid var(--accent);border-radius:24px;
  font-size:40px;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  box-shadow:var(--shadow);padding:14px;transition:transform .12s;
}
.opt:active{transform:scale(.96);}
.opt .o-emoji{font-size:64px;line-height:1.1;}
.opt .o-label{line-height:1.25;}
.opt-grid.hanzi .opt .o-label{font-family:"KaiTi","STKaiti",serif;font-size:64px;font-weight:400;}
.opt-grid.letter .opt .o-label{font-family:"Comic Sans MS","Segoe UI",sans-serif;font-size:64px;color:var(--accent);}
.opt-grid.word .opt .o-label{font-family:"Comic Sans MS","Segoe UI",sans-serif;font-size:34px;color:var(--accent);}
.opt-grid.bigmoji .opt .o-emoji{font-size:80px;}
.opt.right{border-color:var(--go);background:#EAF8EE;animation:pop .35s;}
.opt.wrong{border-color:var(--no);background:#FFEFEC;animation:shake .45s;}
.opt.dim{opacity:.35;}

.match-wrap{display:flex;gap:34px;width:100%;max-width:820px;justify-content:center;}
.match-col{display:flex;flex-direction:column;gap:14px;flex:1;max-width:340px;}
.m-item{
  min-height:92px;font-size:40px;font-weight:800;background:#fff;
  border:5px solid var(--accent);border-radius:22px;box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;padding:8px 14px;
  font-family:"Comic Sans MS","KaiTi","Microsoft YaHei",sans-serif;
}
.m-item.sel{border-color:var(--sun);background:#FFF6DC;transform:scale(1.05);}
.m-item.locked{border-color:var(--go);background:#EAF8EE;opacity:.85;}
.m-item.wrong{animation:shake .45s;border-color:var(--no);}

.order-line{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;min-height:84px;
  background:#F2F7FF;border:3px dashed var(--accent);border-radius:18px;padding:12px;width:100%;max-width:880px;}
.order-pool{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:880px;}
.chip{
  font-size:30px;font-weight:800;background:#fff;border:4px solid var(--accent);
  border-radius:18px;padding:14px 20px;box-shadow:var(--shadow);
}
.chip.big{font-size:34px;padding:18px 24px;}
.chip.placed{background:#EAF8EE;border-color:var(--go);box-shadow:none;animation:pop .3s;}
.chip.used{opacity:.25;pointer-events:none;}
.chip.wrong{animation:shake .45s;border-color:var(--no);}
.chip.gone{opacity:0;transform:translateY(-60px) scale(.4);transition:all .4s;}

.sort-target{font-size:110px;line-height:1.1;}
.sort-target.pop{animation:pop .3s;}
.sort-count{font-size:26px;font-weight:800;color:var(--go);}
.sort-hint{font-size:24px;color:#B3573F;min-height:32px;font-weight:700;}

.blend-row{display:flex;gap:16px;}
.blend-tile{
  font-family:"Comic Sans MS","KaiTi",sans-serif;font-size:72px;font-weight:800;color:var(--accent);
  background:#fff;border:5px solid var(--accent);border-radius:22px;width:120px;height:130px;
  box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;
}
.blend-tile.pop{animation:pop .3s;}

.next-btn{
  font-size:30px;font-weight:800;color:#fff;background:var(--go);
  border:none;border-radius:20px;padding:18px 42px;box-shadow:0 6px 0 #2F7A47;margin-top:6px;
}
.next-btn:active{transform:translateY(4px);box-shadow:none;}
.next-btn.ghost{background:#fff;color:var(--ink);border:4px solid var(--accent);box-shadow:var(--shadow);}

.finish .finish-stars{font-size:60px;letter-spacing:6px;}
.btn-row{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;}

.star-fly{
  position:fixed;font-size:64px;pointer-events:none;z-index:50;
  animation:flyup 1s ease-out forwards;
}
@keyframes flyup{0%{transform:translateY(0) scale(.6);opacity:0}25%{opacity:1}100%{transform:translateY(-180px) scale(1.4);opacity:0}}
@keyframes pop{0%{transform:scale(.7)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-12px)}50%{transform:translateX(10px)}75%{transform:translateX(-6px)}}

@media (max-width:720px){
  .t-big{font-size:88px}.t-big.hanzi{font-size:104px}.t-big.letter{font-size:96px}
  .q-title{font-size:26px}.opt{font-size:32px;min-height:104px}
  .match-wrap{gap:16px}.m-item{font-size:32px;min-height:80px}
  .topbar{font-size:19px}#mod-title{font-size:19px}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}

/* ---- 一体版主页样式 ---- */
.topbar .home-btn{
  color:#fff;background:rgba(255,255,255,.18);border:none;
  padding:8px 16px;border-radius:14px;font-size:20px;font-weight:700;white-space:nowrap;
}
.hub-hero{position:relative;border-radius:30px;overflow:hidden;box-shadow:0 8px 0 rgba(27,42,74,.12);margin-top:6px;}
.hub-hero svg{display:block;width:100%;height:auto;}
.hub-hero .hero-text{position:absolute;top:7%;left:5%;right:5%;}
.hub-hero h1{margin:0;font-size:42px;line-height:1.2;text-shadow:0 2px 0 #fff;}
.hub-hero p{margin:8px 0 0;font-size:23px;font-weight:700;color:#37527E;text-shadow:0 1px 0 #fff;}
.hub-hero .badge{display:inline-block;margin-top:12px;background:#fff;border:4px solid #2563B8;border-radius:999px;
  padding:8px 20px;font-size:21px;font-weight:800;}
.hub-total{display:flex;align-items:center;justify-content:center;margin:20px 0 6px;
  font-size:28px;font-weight:800;color:#8A6100;}
.hub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:20px;margin-top:12px;}
@media(max-width:960px){.hub-grid{grid-template-columns:1fr;}}
.camp{display:flex;align-items:center;gap:18px;text-align:left;
  background:#fff;border-radius:26px;padding:20px 22px;box-shadow:0 6px 0 rgba(27,42,74,.12);
  border:5px solid var(--c,#2563B8);transition:transform .12s;font-family:inherit;}
.camp:active{transform:scale(.97);}
.camp .ico{font-size:58px;line-height:1;}
.camp .tt{flex:1;}
.camp .tt b{display:block;font-size:27px;color:var(--ink);}
.camp .tt span{display:block;font-size:18px;opacity:.7;margin-top:2px;color:var(--ink);}
.camp .stars{font-size:20px;font-weight:800;color:#B07A00;background:#FFF3CF;border-radius:14px;padding:8px 14px;white-space:nowrap;}
.hub-tip{margin-top:24px;background:#fff;border-radius:22px;padding:18px 22px;font-size:21px;line-height:1.6;
  border:4px dashed #2563B8;box-shadow:0 6px 0 rgba(27,42,74,.08);color:var(--ink);}
.hub-tip b{color:#2563B8;}
@media(max-width:720px){.hub-hero h1{font-size:26px}.hub-hero p{font-size:16px}.hub-hero .badge{font-size:16px;padding:6px 14px}}

/* ---- 学习报告导出 ---- */
.export-btn{
  display:block;margin:22px auto 0;font-size:24px;font-weight:800;color:#fff;
  background:#2563B8;border:none;border-radius:18px;padding:16px 30px;
  box-shadow:0 6px 0 #173E7E;font-family:inherit;
}
.export-btn:active{transform:translateY(4px);box-shadow:none;}
.rep-modal{position:fixed;inset:0;background:rgba(27,42,74,.55);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;}
.rep-box{background:#fff;border-radius:24px;padding:24px;max-width:720px;width:100%;
  display:flex;flex-direction:column;gap:12px;box-shadow:0 10px 0 rgba(0,0,0,.18);}
.rep-title{font-size:24px;font-weight:800;}
.rep-sub{font-size:18px;line-height:1.5;opacity:.85;}
.rep-text{width:100%;height:200px;font-size:14px;font-family:Consolas,monospace;
  border:3px solid #B9C9DE;border-radius:14px;padding:10px;resize:vertical;}

/* ===== v4 新屏型样式 ===== */

/* 发现层 */
.eyebrow.challenge{background:#FFE4D6;color:#C2410C;}
.disc-stage{
  width:100%;max-width:760px;min-height:230px;background:#F7FBFF;border:4px solid var(--accent);
  border-radius:24px;display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:96px;position:relative;overflow:hidden;padding:20px;
}
.disc-row{display:flex;align-items:center;gap:8px;font-family:"Comic Sans MS","KaiTi",sans-serif;font-weight:800;color:var(--accent);}
.disc-letter{font-size:90px;}
.disc-plus{font-size:54px;color:#999;}
/* Magic e 滑入 */
.magic-e{display:inline-block;opacity:0;transform:translateX(60px);}
.anim.go .magic-e{animation:slideIn 1.1s ease-out forwards;}
@keyframes slideIn{0%{opacity:0;transform:translateX(80px) scale(.5)}60%{opacity:1;transform:translateX(0) scale(1.3)}100%{opacity:1;transform:translateX(0) scale(1)}}
.morph{display:inline-block;}
.anim.go .morph{animation:morphPop 1.1s ease-out;}
@keyframes morphPop{0%,55%{color:var(--accent)}70%{color:#E2574C;transform:scale(1.3)}100%{transform:scale(1)}}
/* 通用滑入元素 */
.anim .fade-step{opacity:0;}
.anim.go .fade-step{animation:fadeStep .6s ease-out forwards;}
.anim.go .fade-step.d1{animation-delay:.2s}.anim.go .fade-step.d2{animation-delay:.6s}.anim.go .fade-step.d3{animation-delay:1s}
@keyframes fadeStep{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.arrow-grow{display:inline-block;}
.anim.go .arrow-grow{animation:grow .5s ease-out .3s both;}
@keyframes grow{from{transform:scale(0)}to{transform:scale(1)}}

/* 描红 */
.trace-wrap{position:relative;width:320px;height:320px;}
.trace-guide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:240px;color:#DCE6F2;pointer-events:none;z-index:0;}
.trace-guide.hanzi{font-family:"KaiTi","STKaiti",serif;}
.trace-guide.letter{font-family:"Comic Sans MS",sans-serif;font-size:220px;}
.trace-guide.shake{animation:shake .45s;}
.trace-canvas{position:absolute;inset:0;z-index:1;border:4px dashed var(--accent);border-radius:20px;background:transparent;touch-action:none;cursor:crosshair;}

/* 录音 */
.rec-btn{font-size:30px;font-weight:800;color:#fff;background:#E2574C;border:none;border-radius:22px;
  padding:20px 40px;box-shadow:0 6px 0 #A8392F;font-family:inherit;}
.rec-btn.rec{background:#C2410C;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.rec-status{font-size:22px;font-weight:700;color:#555;min-height:30px;text-align:center;}

/* 绘本 */
.book-screen{background:linear-gradient(180deg,#FFFDF5,#FFF4E0);}
.book-page{width:100%;max-width:680px;min-height:300px;background:#fff;border:5px solid #F0B850;
  border-radius:24px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:18px;padding:28px;}
.book-page.flip{animation:flipIn .5s ease-out;}
@keyframes flipIn{from{opacity:0;transform:rotateY(-12deg) translateX(20px)}to{opacity:1;transform:none}}
.book-emoji{font-size:110px;line-height:1.1;text-align:center;}
.book-text{font-family:"Comic Sans MS","KaiTi","Microsoft YaHei",sans-serif;font-size:38px;font-weight:800;
  color:#5A3A12;text-align:center;line-height:1.4;}
.book-cap{font-size:24px;color:#8A6100;text-align:center;min-height:30px;}
.book-nav{display:flex;align-items:center;gap:24px;}
.book-arrow{font-size:28px;font-weight:800;color:#fff;background:#F0B850;border:none;border-radius:16px;
  padding:12px 24px;box-shadow:0 5px 0 #C28A20;font-family:inherit;min-width:80px;}
.book-arrow:disabled{opacity:.35;}
.book-pginfo{font-size:22px;font-weight:800;color:#8A6100;}

@media(max-width:720px){
  .disc-stage{font-size:64px;min-height:180px}
  .trace-wrap,.trace-canvas{width:260px;height:260px}.trace-guide{font-size:190px}
  .book-emoji{font-size:84px}.book-text{font-size:28px}
}

/* 描红按钮(与 next-btn 同款,但不触发 showNext 的去重) */
.trace-btn{font-size:28px;font-weight:800;color:#fff;background:var(--go);border:none;border-radius:18px;
  padding:16px 32px;box-shadow:0 6px 0 #2F7A47;font-family:inherit;}
.trace-btn:active{transform:translateY(4px);box-shadow:none;}
.trace-btn.ghost{background:#fff;color:var(--ink);border:4px solid var(--accent);box-shadow:var(--shadow);}
.trace-btn:disabled{opacity:.7;}

</style>
</head>
<body>
<header class="topbar">
  <button class="home-btn" id="home-btn">⛺ 主页</button>
  <span id="mod-title">⛰️ 艾伦的登山大冒险</span>
  <span id="topstars">⭐ 0</span>
</header>
<main id="stage"></main>
<script>
'use strict';
/* ===== 艾伦学前衔接课件 · 共享引擎 v1 ===== */

/* ---------- 进度存储(localStorage,失败时退回内存) ---------- */
const MEM = {};
function sget(k){ try{ const v = localStorage.getItem(k); return v == null ? (k in MEM ? MEM[k] : null) : v; }catch(e){ return k in MEM ? MEM[k] : null; } }
function sset(k,v){ MEM[k] = String(v); try{ localStorage.setItem(k, String(v)); }catch(e){} }

/* ---------- 语音朗读 ---------- */
let VOICES = [];
function refreshVoices(){ try{ VOICES = window.speechSynthesis.getVoices() || []; }catch(e){ VOICES = []; } }
if ('speechSynthesis' in window){ refreshVoices(); window.speechSynthesis.onvoiceschanged = refreshVoices; }
function speak(text, lang, queue){
  if (!('speechSynthesis' in window)) return;
  try{
    if (!queue) window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = lang.indexOf('zh') === 0 ? 0.85 : 0.78; u.pitch = 1.05;
    const lc = lang.toLowerCase();
    const v = VOICES.find(x => x.lang && x.lang.replace('_','-').toLowerCase().indexOf(lc) === 0)
           || VOICES.find(x => x.lang && x.lang.toLowerCase().indexOf(lc.slice(0,2)) === 0);
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function hush(){ try{ window.speechSynthesis.cancel(); }catch(e){} }

/* ---------- 音效 ---------- */
let AC = null;
function fx(ok){
  try{
    AC = AC || new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    const t = AC.currentTime;
    const notes = ok ? [[523,0],[659,.12],[784,.24]] : [[233,0],[208,.18]];
    notes.forEach(p => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = 'sine'; o.frequency.value = p[0];
      g.gain.setValueAtTime(.0001, t+p[1]);
      g.gain.exponentialRampToValueAtTime(.2, t+p[1]+.02);
      g.gain.exponentialRampToValueAtTime(.0001, t+p[1]+(ok?.25:.3));
      o.connect(g); g.connect(AC.destination);
      o.start(t+p[1]); o.stop(t+p[1]+.5);
    });
  }catch(e){}
}

/* ---------- 工具 ---------- */
function shuffle(a){ a = a.slice(); for (let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); const tmp=a[i]; a[i]=a[j]; a[j]=tmp; } return a; }
function el(tag, cls, html){ const e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; }

/* ---------- 状态 ---------- */
let M = null, LI = 0, SI = 0, runStars = 0, scMist = [];
const STARRY = { quiz:1, match:1, order:1, sort:1, blend:1, trace:1, rec:1, book:1, challenge:2 };
function starKey(li){ return 'alan_v3_' + M.id + '_' + li; }
function getRec(li){
  const raw = sget(starKey(li));
  if (raw){ try{ const r = JSON.parse(raw); if (r && typeof r === 'object') return r; }catch(e){} }
  return { s:0, m:0, p:0, e:0 };
}
function lessonMax(les){ return les.screens.reduce((n,s)=> n + (STARRY[s.t]?1:0), 0); }
function moduleStars(){ let t=0; M.lessons.forEach((l,i)=>{ t += (getRec(i).s||0); }); return t; }
function updateTopStars(){ const e=document.getElementById('topstars'); if(e) e.textContent = '⭐ ' + moduleStars(); }

/* ---------- 选关菜单 ---------- */
function renderMenu(){
  hush();
  const stage = document.getElementById('stage'); stage.innerHTML = '';
  const hd = el('div','menu-head');
  hd.appendChild(el('div','mascot', M.mascot || '🦝'));
  const tt = el('div','menu-titles');
  tt.appendChild(el('h1','', M.title));
  tt.appendChild(el('p','sub', M.subtitle || ''));
  hd.appendChild(tt);
  stage.appendChild(hd);
  const grid = el('div','menu-grid');
  M.lessons.forEach((les,i)=>{
    const got = (getRec(i).s||0), max = lessonMax(les);
    const c = el('button','lesson-card');
    c.innerHTML = '<span class="lc-icon">'+les.icon+'</span>'
      + '<span class="lc-name">'+les.title+'</span>'
      + '<span class="lc-sub">'+(les.subtitle||'')+'</span>'
      + '<span class="lc-stars">'+(got>0 ? '⭐ '+got+' / '+max : '☆ '+max+' 颗星等你拿')+'</span>';
    c.onclick = ()=> startLesson(i);
    grid.appendChild(c);
  });
  stage.appendChild(grid);
  updateTopStars();
}

function startLesson(i){ LI = i; SI = 0; runStars = 0; scMist = []; renderScreen(); }

/* ---------- 关卡屏幕外壳 ---------- */
function screenShell(){
  hush();
  const stage = document.getElementById('stage'); stage.innerHTML = '';
  const les = M.lessons[LI];
  const bar = el('div','play-bar');
  const back = el('button','quit-btn','⬅ 选关'); back.onclick = renderMenu; bar.appendChild(back);
  const dots = el('div','dots');
  les.screens.forEach((s,i)=> dots.appendChild(el('span','dot'+(i<SI?' done':(i===SI?' now':'')))));
  bar.appendChild(dots);
  const rs = el('div','run-stars'); rs.id='run-stars'; rs.textContent = '⭐ ' + runStars; bar.appendChild(rs);
  stage.appendChild(bar);
  const scr = el('div','screen'); stage.appendChild(scr);
  return scr;
}
function showNext(scr,label){
  if (scr.querySelector('.next-btn')) return;
  const b = el('button','next-btn', label || '下一个 ➜');
  b.onclick = ()=>{ SI++; renderScreen(); };
  scr.appendChild(b);
}
function giveStar(){
  runStars++;
  const rs = document.getElementById('run-stars'); if (rs) rs.textContent = '⭐ ' + runStars;
  const s = el('div','star-fly','⭐');
  s.style.left = (window.innerWidth/2 - 32 + (Math.random()*120-60)) + 'px';
  s.style.top  = (window.innerHeight/2) + 'px';
  document.body.appendChild(s);
  setTimeout(()=> s.remove(), 1100);
}

/* ---------- 屏型:教学卡 ---------- */
function rCard(scr,s){
  if (s.top) scr.appendChild(el('div','eyebrow', s.top));
  const card = el('div','teach-card');
  if (s.emoji) card.appendChild(el('div','t-emoji', s.emoji));
  if (s.big != null) card.appendChild(el('div','t-big '+(s.bigClass||''), s.big));
  if (s.pinyin) card.appendChild(el('div','t-pinyin', s.pinyin));
  if (s.caption) card.appendChild(el('div','t-cap', s.caption));
  const doSpeak = ()=>{ if (s.say) speak(s.say.text, s.say.lang); if (s.say2) speak(s.say2.text, s.say2.lang, true); };
  const sb = el('button','speak-btn','🔊 再听一次'); sb.onclick = doSpeak; card.appendChild(sb);
  scr.appendChild(card);
  setTimeout(doSpeak, 450);
  showNext(scr,'下一个 ➜');
}

/* ---------- 屏型:点选答题 ---------- */
function rQuiz(scr,s){
  scr.appendChild(el('div','q-title', s.q));
  if (s.say){
    const rb = el('button','speak-btn big','🔊 听一听');
    const ds = ()=> speak(s.say.text, s.say.lang);
    rb.onclick = ds; scr.appendChild(rb); setTimeout(ds, 500);
  }
  const grid = el('div','opt-grid'+(s.optClass?' '+s.optClass:''));
  let solved = false;
  shuffle(s.options).forEach(o=>{
    const b = el('button','opt');
    b.innerHTML = (o.emoji?'<span class="o-emoji">'+o.emoji+'</span>':'') + (o.label?'<span class="o-label">'+o.label+'</span>':'');
    b.onclick = ()=>{
      if (solved) return;
      if (o.ok){
        solved = true; b.classList.add('right'); fx(true);
        giveStar(); if (s._double) giveStar();
        grid.querySelectorAll('.opt').forEach(x=>{ if (x!==b) x.classList.add('dim'); });
        if (s.sayAfter) setTimeout(()=> speak(s.sayAfter.text, s.sayAfter.lang), 350);
        showNext(scr,'下一题 ➜');
      } else {
        scMist[SI] = (scMist[SI]||0) + 1;
        b.classList.add('wrong'); fx(false);
        setTimeout(()=> b.classList.remove('wrong'), 500);
      }
    };
    grid.appendChild(b);
  });
  scr.appendChild(grid);
}

/* ---------- 屏型:配对 ---------- */
function rMatch(scr,s){
  scr.appendChild(el('div','q-title', s.q || '配一配:先点左边,再点它的好朋友!'));
  const wrap = el('div','match-wrap');
  const L = el('div','match-col'), R = el('div','match-col');
  let sel = null, locked = 0, mistakes = 0;
  shuffle(s.pairs.map((p,i)=>({v:p[0],i}))).forEach(o=>{
    const b = el('button','m-item', o.v); b.dataset.i = o.i;
    b.onclick = ()=>{
      if (b.classList.contains('locked')) return;
      L.querySelectorAll('.m-item').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel'); sel = b;
    };
    L.appendChild(b);
  });
  shuffle(s.pairs.map((p,i)=>({v:p[1],i}))).forEach(o=>{
    const b = el('button','m-item', o.v); b.dataset.i = o.i;
    b.onclick = ()=>{
      if (b.classList.contains('locked') || !sel) return;
      if (sel.dataset.i === b.dataset.i){
        sel.classList.add('locked'); sel.classList.remove('sel'); b.classList.add('locked');
        fx(true); sel = null; locked++;
        if (locked === s.pairs.length){ giveStar(); showNext(scr,'下一题 ➜'); }
      } else {
        mistakes++; scMist[SI] = (scMist[SI]||0) + 1;
        b.classList.add('wrong'); fx(false);
        setTimeout(()=> b.classList.remove('wrong'), 500);
      }
    };
    R.appendChild(b);
  });
  wrap.appendChild(L); wrap.appendChild(R); scr.appendChild(wrap);
}

/* ---------- 屏型:排顺序 ---------- */
function rOrder(scr,s){
  scr.appendChild(el('div','q-title', s.q));
  const line = el('div','order-line');
  const pool = el('div','order-pool');
  let idx = 0;
  shuffle(s.items.map((v,i)=>({v,i}))).forEach(o=>{
    const b = el('button','chip', o.v);
    b.onclick = ()=>{
      if (b.classList.contains('used')) return;
      if (o.i === idx){
        b.classList.add('used');
        line.appendChild(el('div','chip placed', o.v));
        fx(true); idx++;
        if (idx === s.items.length){ giveStar(); showNext(scr,'下一题 ➜'); }
      } else {
        scMist[SI] = (scMist[SI]||0) + 1;
        b.classList.add('wrong'); fx(false);
        setTimeout(()=> b.classList.remove('wrong'), 500);
      }
    };
    pool.appendChild(b);
  });
  scr.appendChild(line); scr.appendChild(pool);
}

/* ---------- 屏型:分拣(装书包) ---------- */
function rSort(scr,s){
  scr.appendChild(el('div','q-title', s.q));
  const target = el('div','sort-target', s.target || '🎒');
  const count = el('div','sort-count','0 / ' + s.items.filter(i=>i.good).length);
  const pool = el('div','order-pool');
  const hint = el('div','sort-hint','');
  const goods = s.items.filter(i=>i.good).length; let got = 0;
  shuffle(s.items).forEach(it=>{
    const b = el('button','chip big', it.label);
    b.onclick = ()=>{
      if (b.classList.contains('gone')) return;
      if (it.good){
        b.classList.add('gone'); fx(true); got++;
        count.textContent = got + ' / ' + goods;
        target.classList.add('pop'); setTimeout(()=> target.classList.remove('pop'), 320);
        if (it.say) speak(it.say.text, it.say.lang);
        if (got === goods){ hint.textContent = '书包整理好啦!'; hint.style.color = '#2F7A47'; giveStar(); showNext(scr,'下一题 ➜'); }
      } else {
        scMist[SI] = (scMist[SI]||0) + 1;
        b.classList.add('wrong'); fx(false);
        hint.textContent = it.hint || '这个不用带哦!';
        setTimeout(()=>{ b.classList.remove('wrong'); }, 500);
      }
    };
    pool.appendChild(b);
  });
  scr.appendChild(target); scr.appendChild(count); scr.appendChild(pool); scr.appendChild(hint);
}

/* ---------- 屏型:拼读 ---------- */
function rBlend(scr,s){
  scr.appendChild(el('div','q-title', s.q || '点一点,再把它们拼起来!'));
  if (s.emoji) scr.appendChild(el('div','t-emoji', s.emoji));
  const row = el('div','blend-row');
  s.parts.forEach(p=>{
    const txt = (typeof p === 'string') ? p : p.p;
    const sy  = (typeof p === 'string') ? {text:txt, lang:(s.lang||'en-US')} : p.say;
    const b = el('button','blend-tile', txt);
    b.onclick = ()=>{ b.classList.add('pop'); setTimeout(()=>b.classList.remove('pop'),300); speak(sy.text, sy.lang); };
    row.appendChild(b);
  });
  scr.appendChild(row);
  let done = false;
  const btn = el('button','speak-btn big','🔊 拼起来:' + s.word);
  btn.onclick = ()=>{
    if (s.saySlow) speak(s.saySlow.text, s.saySlow.lang);
    speak(s.say.text, s.say.lang, !!s.saySlow);
    if (!done){ done = true; giveStar(); showNext(scr,'下一题 ➜'); }
  };
  scr.appendChild(btn);
  if (s.caption) scr.appendChild(el('div','t-cap', s.caption));
}

/* ---------- 结算 ---------- */
function rFinish(){
  hush();
  const les = M.lessons[LI];
  const max = lessonMax(les);
  const prev = getRec(LI);
  const errs = []; for (let i=0;i<les.screens.length;i++) errs.push(scMist[i]||0);
  const rec = {
    s: Math.max(runStars, prev.s||0), m: max, p: (prev.p||0)+1,
    e: errs.reduce(function(a,b){return a+b;},0), sc: errs,
    d: new Date().toISOString().slice(0,10)
  };
  sset(starKey(LI), JSON.stringify(rec));
  const stage = document.getElementById('stage'); stage.innerHTML = '';
  const scr = el('div','screen finish');
  scr.appendChild(el('div','t-emoji big','🎉'));
  scr.appendChild(el('div','q-title','太棒了!完成「' + les.title + '」'));
  scr.appendChild(el('div','finish-stars', '⭐'.repeat(Math.max(runStars,1))));
  scr.appendChild(el('div','t-cap','这一关收获 ' + runStars + ' / ' + max + ' 颗星'));
  const row = el('div','btn-row');
  const again = el('button','next-btn ghost','再玩一次 🔁'); again.onclick = ()=> startLesson(LI);
  const menu  = el('button','next-btn','回到选关 ⛺'); menu.onclick = renderMenu;
  row.appendChild(again); row.appendChild(menu);
  scr.appendChild(row);
  stage.appendChild(scr);
  for (let i=0;i<6;i++){
    setTimeout(()=>{
      const st = el('div','star-fly','⭐');
      st.style.left = (10 + Math.random()*80) + 'vw';
      st.style.top = '70vh';
      document.body.appendChild(st);
      setTimeout(()=> st.remove(), 1100);
    }, i*150);
  }
  setTimeout(()=> speak('太棒了!','zh-CN'), 400);
  updateTopStars();
}

/* ---------- 调度 ---------- */
function renderScreen(){
  const les = M.lessons[LI];
  if (SI >= les.screens.length){ rFinish(); return; }
  const scr = screenShell();
  const s = les.screens[SI];
  const R = { card:rCard, quiz:rQuiz, match:rMatch, order:rOrder, sort:rSort, blend:rBlend };
  (R[s.t] || rCard)(scr, s);
}

/* ---------- 启动 ---------- */
function boot(mod){
  M = mod;
  document.title = mod.title + ' · 艾伦学前衔接课件';
  const tb = document.getElementById('mod-title'); if (tb) tb.textContent = mod.icon + ' ' + mod.title;
  if (mod.accent) document.documentElement.style.setProperty('--accent', mod.accent);
  renderMenu();
}


'use strict';
/* ===== v4 引擎扩展:新屏型 + 挑战层 + 升级版 key ===== */

/* 覆盖 key 前缀为 v4 */
function starKey(li){ return 'alan_v4_' + M.id + '_' + li; }

function rDiscover(scr, s){

/* ---------- 屏型:描红(Canvas 笔顺书写) ---------- */
function rTrace(scr, s){
  scr.appendChild(el('div','q-title', s.q || ('描一描:' + s.char)));
  if (s.say){ const sb = el('button','speak-btn','🔊 听读音'); sb.onclick = ()=> speak(s.say.text, s.say.lang); scr.appendChild(sb); }
  const wrap = el('div','trace-wrap');
  const guide = el('div','trace-guide '+(s.cls||''), s.char);
  const cvs = document.createElement('canvas');
  cvs.className = 'trace-canvas'; cvs.width = 320; cvs.height = 320;
  wrap.appendChild(guide); wrap.appendChild(cvs);
  scr.appendChild(wrap);

  const ctx = cvs.getContext ? cvs.getContext('2d') : null;
  if (!ctx){
    // 降级:无 Canvas 支持时,看影子比划,直接可完成
    const tip = el('div','t-cap','用手指在大字上比划几遍,然后点「写好了」!');
    scr.appendChild(tip);
    const done0 = el('button','trace-btn','✅ 写好了');
    done0.onclick = ()=>{ fx(true); giveStar(); done0.disabled = true; done0.textContent='⭐ 真棒!'; showNext(scr,'下一个 ➜'); };
    scr.appendChild(done0);
    return;
  }
  ctx.lineWidth = 18; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#E2574C';
  let drawing = false, painted = 0;
  function pos(e){
    const r = cvs.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x:(t.clientX - r.left)*(cvs.width/r.width), y:(t.clientY - r.top)*(cvs.height/r.height) };
  }
  function start(e){ drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }
  function move(e){ if(!drawing) return; const p = pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); painted++; e.preventDefault(); }
  function end(){ drawing = false; }
  cvs.addEventListener('mousedown',start); cvs.addEventListener('mousemove',move);
  window.addEventListener('mouseup',end);
  cvs.addEventListener('touchstart',start,{passive:false}); cvs.addEventListener('touchmove',move,{passive:false});
  cvs.addEventListener('touchend',end);

  const row = el('div','btn-row');
  const clr = el('button','trace-btn ghost','🧽 擦掉重写'); clr.onclick = ()=>{ ctx.clearRect(0,0,cvs.width,cvs.height); painted=0; };
  const done = el('button','trace-btn','✅ 写好了'); 
  done.onclick = ()=>{
    if (painted < 8){ guide.classList.add('shake'); setTimeout(()=>guide.classList.remove('shake'),500); return; }
    fx(true); giveStar();
    done.disabled = true; done.textContent = '⭐ 真棒!';
    showNext(scr, '下一个 ➜');
  };
  row.appendChild(clr); row.appendChild(done);
  scr.appendChild(row);
}

/* ---------- 屏型:录音跟读 ---------- */
function rSpeak(scr, s){
  scr.appendChild(el('div','eyebrow','🎤 跟读小明星'));
  scr.appendChild(el('div','t-big phrase', s.text));
  if (s.zh) scr.appendChild(el('div','t-cap', s.zh));

  const listen = el('button','speak-btn big','🔊 听老师读'); 
  listen.onclick = ()=> speak(s.say.text, s.say.lang);
  scr.appendChild(listen);
  setTimeout(()=> speak(s.say.text, s.say.lang), 500);

  const recBtn = el('button','rec-btn','🎙️ 按住说话');
  const status = el('div','rec-status','先听老师读,再按住下面的按钮大声说!');
  const play = el('button','speak-btn','▶️ 再听一次我的声音'); play.style.display = 'none';

  let stream = null, recorder = null, chunks = [], audioUrl = null;
  let holding = false, busy = false, gifted = false;
  const unsupported = !(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);

  function gift(){ if (!gifted){ gifted = true; fx(true); giveStar(); showNext(scr, '下一个 ➜'); } }
  function idle(){ recBtn.classList.remove('rec'); recBtn.textContent = '🎙️ 按住说话'; }
  function readAloudFallback(msg){
    status.textContent = msg || '麦克风没能打开,跟着老师大声读一遍也很棒!';
    recBtn.classList.remove('rec'); recBtn.textContent = '🗣️ 我读好了';
    recBtn.onclick = ()=>{ recBtn.disabled = true; recBtn.textContent = '⭐ 真棒!'; gift(); };
  }

  // 设备不支持录音:点一下当作读完,照常得星
  if (unsupported){
    scr.appendChild(recBtn); scr.appendChild(status);
    readAloudFallback('这台设备不支持录音,跟着老师大声读一遍也很棒!');
    return;
  }

  async function beginHold(){
    if (busy || gifted) return;        // 正在录/正在请求,忽略重复按下
    busy = true; holding = true;
    recBtn.classList.add('rec'); recBtn.textContent = '🔴 松开结束';
    status.textContent = stream ? '正在录音…大声说!' : '请点「允许」打开麦克风…';

    let s;
    try {
      // 麦克风流只在第一次请求(弹一次授权),之后本屏复用,不再请求
      if (!stream) stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      s = stream;
    } catch(err){
      busy = false; holding = false;
      readAloudFallback('麦克风没能打开(可能被拒绝了),跟着老师大声读一遍也很棒!');
      return;
    }

    // 若在等授权期间用户已松手(通常是松开去点了授权弹窗):本次不录,提示再按
    if (!holding){
      busy = false; idle();
      status.textContent = '✅ 麦克风已开启!现在按住按钮就能直接录音啦。';
      return;
    }

    try {
      chunks = [];
      recorder = new MediaRecorder(s);
      recorder.ondataavailable = e=>{ if (e.data && e.data.size) chunks.push(e.data); };
      recorder.onstop = ()=>{
        busy = false;
        if (chunks.length){
          if (audioUrl) URL.revokeObjectURL(audioUrl);
          audioUrl = URL.createObjectURL(new Blob(chunks, { type:'audio/webm' }));
          status.textContent = '🎧 听听你自己的声音!';
          play.style.display = 'inline-block';
          try { const a = new Audio(audioUrl); a.play().catch(()=>{}); } catch(_){}   // 松开自动回放一次
        } else {
          status.textContent = '再按住按钮,多说一会儿试试!';
        }
        gift();
      };
      recorder.start();
      status.textContent = '正在录音…大声说!';
    } catch(err){
      busy = false; holding = false;
      readAloudFallback();
    }
  }

  function endHold(){
    if (!holding) return;
    holding = false;
    recBtn.classList.remove('rec'); recBtn.textContent = '🎙️ 再说一次';
    if (recorder && recorder.state === 'recording'){
      recorder.stop();            // → onstop:生成回放 + 得星
    } else {
      busy = false;               // 还在授权、尚未开始录就松手了,释放占用
    }
  }

  // 触屏(平板主力):touchstart 里 preventDefault 同时阻止浏览器合成多余的鼠标事件
  recBtn.addEventListener('touchstart', e=>{ e.preventDefault(); beginHold(); }, { passive:false });
  recBtn.addEventListener('touchend',   e=>{ e.preventDefault(); endHold();   }, { passive:false });
  // 鼠标:mouseup 与 mouseleave 双保险,移出按钮再松开也能正常停止
  recBtn.addEventListener('mousedown', e=>{ e.preventDefault(); beginHold(); });
  recBtn.addEventListener('mouseup',   endHold);
  recBtn.addEventListener('mouseleave', endHold);

  scr.appendChild(recBtn); scr.appendChild(status);
  play.onclick = ()=>{ if (audioUrl){ try { new Audio(audioUrl).play(); } catch(_){} } };
  scr.appendChild(play);
}

/* ---------- 屏型:迷你绘本(点读 + 翻页) ---------- */
function rBook(scr, s){
  let pg = 0;
  scr.classList.add('book-screen');
  const page = el('div','book-page');
  const cap = el('div','book-cap');
  const navRow = el('div','book-nav');
  const prev = el('button','book-arrow','◀');
  const pginfo = el('div','book-pginfo','');
  const next = el('button','book-arrow','▶');
  navRow.appendChild(prev); navRow.appendChild(pginfo); navRow.appendChild(next);
  scr.appendChild(page); scr.appendChild(cap); scr.appendChild(navRow);

  const sb = el('button','speak-btn big','🔊 读这一页'); scr.appendChild(sb);

  function show(){
    const p = s.pages[pg];
    page.innerHTML = '<div class="book-emoji">' + p.art + '</div><div class="book-text">' + p.text + '</div>';
    cap.textContent = p.zh || '';
    pginfo.textContent = (pg+1) + ' / ' + s.pages.length;
    prev.disabled = pg === 0;
    page.classList.remove('flip'); void page.offsetWidth; page.classList.add('flip');
    sb.onclick = ()=> speak(p.say.text, p.say.lang);
    setTimeout(()=> speak(p.say.text, p.say.lang), 350);
    if (pg === s.pages.length - 1){ next.textContent = '✅ 读完啦'; }
    else next.textContent = '▶';
  }
  prev.onclick = ()=>{ if (pg>0){ pg--; show(); } };
  let finished = false;
  next.onclick = ()=>{
    if (pg < s.pages.length - 1){ pg++; show(); }
    else if (!finished){ finished = true; fx(true); giveStar(); showNext(scr, '回答问题 ➜'); }
  };
  show();
}

/* ---- v4.1 一体版:登山路线主页 + 学习报告导出 ---- */
const ALL_MODS = [M2, M3, M4, M5];

function recOf(modId, li){
  try{
    const raw = sget('alan_v4_' + modId + '_' + li);
    if (raw){ const r = JSON.parse(raw); if (r && typeof r === 'object') return r; }
  }catch(e){}
  return null;
}
function hubStats(mod){
  let t = 0, done = 0;
  mod.lessons.forEach(function(l, i){
    const r = recOf(mod.id, i);
    if (r){ t += (r.s||0); if ((r.s||0) > 0) done++; }
  });
  return { t: t, done: done, n: mod.lessons.length };
}
function grandTotals(){
  let star=0, done=0, total=0;
  ALL_MODS.forEach(function(mod){ const s=hubStats(mod); star+=s.t; done+=s.done; total+=s.n; });
  return { star:star, done:done, total:total };
}

function buildReport(){
  const rep = {
    报告类型:'艾伦学前衔接课件 学习报告', 版本:'v4.1', 孩子:'Alan(艾伦)',
    导出时间:new Date().toLocaleString('zh-CN'),
    总星星:0, 总完成关卡:0, 总关卡:0, 模块:[]
  };
  ALL_MODS.forEach(function(mod){
    const m = { 模块:mod.title, 模块id:mod.id, 关卡:[] };
    mod.lessons.forEach(function(les, i){
      const r = recOf(mod.id, i);
      const max = les.screens.reduce(function(n,s){ return n + (STARRY[s.t]||0); }, 0);
      rep.总关卡++;
      if (r){
        rep.总星星 += (r.s||0);
        if ((r.s||0) > 0) rep.总完成关卡++;
        m.关卡.push({ 关卡:les.title, 最好成绩星:(r.s||0), 满星:max, 练习次数:(r.p||0),
          最近一次错误总数:(r.e||0), 每屏错误分布:(r.sc||[]),
          屏型:les.screens.map(function(s){return s.t;}), 最近游玩日期:(r.d||'') });
      } else {
        m.关卡.push({ 关卡:les.title, 最好成绩星:0, 满星:max, 练习次数:0, 状态:'未开始' });
      }
    });
    rep.模块.push(m);
  });
  return rep;
}

function exportReport(){
  const rep = buildReport();
  const txt = JSON.stringify(rep, null, 2);
  const d = new Date();
  const ymd = '' + d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2);
  const name = ymd + '_艾伦学习报告_v4.1.json';
  let ok = false;
  try{
    const blob = new Blob([txt], {type:'application/json;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = name;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 800);
    ok = true;
  }catch(e){}
  showReportModal(txt, name, ok);
}

function showReportModal(txt, name, downloaded){
  const old = document.getElementById('rep-modal'); if (old) old.remove();
  const wrap = el('div','rep-modal'); wrap.id = 'rep-modal';
  const box = el('div','rep-box');
  box.appendChild(el('div','rep-title', downloaded ? ('✅ 报告已生成:' + name) : '📋 报告内容(请复制后发送)'));
  box.appendChild(el('div','rep-sub', downloaded
    ? '文件已保存到平板的「下载」文件夹。把这个文件发回给 Claude,就能得到针对性的学习分析与下一版调整。如果没看到下载,也可以点下面按钮复制文字。'
    : '请点「复制报告」,把内容粘贴发送给 Claude。'));
  const ta = document.createElement('textarea');
  ta.className = 'rep-text'; ta.readOnly = true; ta.value = txt;
  box.appendChild(ta);
  const row = el('div','btn-row');
  const cp = el('button','next-btn','📋 复制报告');
  cp.onclick = function(){
    ta.focus(); ta.select();
    let done = false; try{ done = document.execCommand('copy'); }catch(e){}
    if (!done && navigator.clipboard){ navigator.clipboard.writeText(txt).then(function(){ cp.textContent='✅ 已复制!'; }); }
    else cp.textContent = done ? '✅ 已复制!' : '请长按文字手动复制';
  };
  const cl = el('button','next-btn ghost','关闭'); cl.onclick = function(){ wrap.remove(); };
  row.appendChild(cp); row.appendChild(cl); box.appendChild(row);
  wrap.appendChild(box); document.body.appendChild(wrap);
}

/* ---- 登山路线 SVG:浣熊随进度移动 ---- */
function trailSVG(progress){  // progress 0..1
  const pts = [[80,360],[240,300],[400,250],[560,180],[720,110],[880,60]];
  // 路径
  let path = 'M'+pts[0][0]+' '+pts[0][1];
  for (let i=1;i<pts.length;i++) path += ' L'+pts[i][0]+' '+pts[i][1];
  // 浣熊位置
  const seg = progress * (pts.length-1);
  const i0 = Math.min(Math.floor(seg), pts.length-2);
  const f = seg - i0;
  const rx = pts[i0][0] + (pts[i0+1][0]-pts[i0][0])*f;
  const ry = pts[i0][1] + (pts[i0+1][1]-pts[i0][1])*f - 26;
  let dots = '';
  pts.forEach(function(p,i){
    const reached = (i/(pts.length-1)) <= progress + 0.001;
    dots += '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="13" fill="'+(reached?'#FFC233':'#fff')+'" stroke="#C9920A" stroke-width="3"/>';
  });
  return '<svg viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="登山进度路线">'
    + '<rect width="1000" height="420" fill="#BFE6FF"/>'
    + '<circle cx="870" cy="70" r="42" fill="#FFD23E"/><circle cx="870" cy="70" r="58" fill="#FFD23E" opacity=".3"/>'
    + '<ellipse cx="220" cy="80" rx="62" ry="22" fill="#fff" opacity=".85"/><ellipse cx="320" cy="66" rx="46" ry="17" fill="#fff" opacity=".85"/>'
    + '<path d="M-20 420 L250 200 L520 420 Z" fill="#7FA8D6"/>'
    + '<path d="M140 420 L520 120 L900 420 Z" fill="#5C84C2"/>'
    + '<path d="M520 120 L585 175 L550 175 L615 235 L572 235 L654 312 L386 312 L468 235 L425 235 L490 175 L455 175 Z" fill="#fff" opacity=".95"/>'
    + '<path d="M640 420 L840 230 L1040 420 Z" fill="#7FA8D6"/>'
    + '<rect x="877" y="44" width="6" height="42" fill="#7A4A21"/><path d="M883 44 L922 56 L883 68 Z" fill="#E2574C"/>'
    + '<path d="'+path+'" fill="none" stroke="#fff" stroke-width="8" stroke-dasharray="2 16" stroke-linecap="round" opacity=".9"/>'
    + dots
    + '<text x="'+rx+'" y="'+ry+'" font-size="46" text-anchor="middle">🦝</text>'
    + '<path d="M0 420 Q250 360 500 388 Q750 416 1000 376 L1000 420 Z" fill="#9CCB7E"/>'
    + '</svg>';
}

  hush();
  document.title = '艾伦的登山大冒险 · v4.1';

    b.onclick = function(){ boot(mod); };

  const exp = el('button','export-btn','📤 导出学习报告(发给 Claude 看)');

  const ts = document.getElementById('topstars'); if (ts) ts.textContent = '⭐ ' + g.star;
}

/* ======================================================================

   设计:
   - 仅覆盖"判错型"屏:quiz / match / order / sort(challenge 复用 quiz)
   - 学习型屏(discover/card/trace/rec/book/blend)不判错,完成即得首次星
   - 判错型屏「本次只要点错一次」→ 0 星 + 进全局错题本(揭示正确答案)
   - 只有「第一次就答对」才得金色 ⭐(runStars,驱动进度)
   - 错题本里「一次答对」→ 得绿色 🌟 订正星 + 该题飞出错题本
   - 存储前缀 alan_v5_ 全新开局;旧版 alan_v4_ 数据保留不动
   - 满星口径统一为 STARRY 求和(挑战题=2),保证 首次星 ≤ 满星 且与报告一致
   ====================================================================== */
(function(){
'use strict';

/* ---------- 存储:统一切到 v5 前缀 ---------- */
starKey = function(li){ return 'alan_v5_' + M.id + '_' + li; };
recOf = function(modId, li){
  try{ var raw = sget('alan_v5_' + modId + '_' + li);
    if (raw){ var r = JSON.parse(raw); if (r && typeof r === 'object') return r; } }catch(e){}
  return null;
};

lessonMax = function(les){ return les.screens.reduce(function(n,s){ return n + (STARRY[s.t]||0); }, 0); };

/* ---------- 错题本持久化(全局,跨模块) ---------- */
var WB_KEY = 'alan_v5_wrongbook';
function wbLoad(){ try{ var r = sget(WB_KEY); return r ? JSON.parse(r) : []; }catch(e){ return []; } }
function wbSave(a){ sset(WB_KEY, JSON.stringify(a)); }
function wbAdd(q){ var a = wbLoad(); if (a.indexOf(q) < 0){ a.push(q); wbSave(a); } }
function wbDel(q){ wbSave(wbLoad().filter(function(x){ return x !== q; })); }
function wbCount(){ return wbLoad().length; }
function wbForLesson(modId, li){ var pre = modId + '|' + li + '|'; return wbLoad().filter(function(q){ return q.indexOf(pre) === 0; }).length; }

/* ---------- 订正星持久化 ---------- */
var FIX_KEY = 'alan_v5_fixstars';
function fixGet(){ var v = parseInt(sget(FIX_KEY), 10); return isNaN(v) ? 0 : v; }

    + 'background:' + (color || '#1B2A4A') + ';color:#fff;font-size:21px;font-weight:800;'

  document.body.appendChild(t);

  setTimeout(function(){ t.remove(); }, 2000);
}
function flyToBook(){

function fixStarFly(n){

      document.body.appendChild(s); setTimeout(function(){ s.remove(); }, 1000);
    }, k*140); })(i);
  }

}

function questionFailed(){

function questionStar(n){

    var b = el('button','opt');
    b.innerHTML = (o.emoji ? '<span class="o-emoji">' + o.emoji + '</span>' : '') + (o.label ? '<span class="o-label">' + o.label + '</span>' : '');
    b._ok = !!o.ok;
    b.onclick = function(){
      if (done) return;
      if (o.ok){
        done = true; b.classList.add('right'); fx(true);
        questionStar(s._double ? 2 : 1);
        grid.querySelectorAll('.opt').forEach(function(x){ if (x !== b) x.classList.add('dim'); x.disabled = true; });
        if (s.sayAfter) setTimeout(function(){ speak(s.sayAfter.text, s.sayAfter.lang); }, 350);
        showNext(scr, '下一题 ➜');
      } else {
        // 首次点错 → 定格、揭示正确答案、0 星、入错题本
        done = true; b.classList.add('wrong'); fx(false);
        questionFailed();
        grid.querySelectorAll('.opt').forEach(function(x){
          x.disabled = true;
          if (x._ok) x.classList.add('right');
          else if (x !== b) x.classList.add('dim');
        });
        if (s.say) setTimeout(function(){ speak(s.say.text, s.say.lang); }, 300);
        inlineMsg(scr, WRONGMODE ? '再看看绿色的正确答案,这题留在错题本里再练一次。' : '✅ 绿色的是正确答案。这题进了错题本,我们一会儿再练一次!');
        showNext(scr, '下一题 ➜');
      }
    };
    grid.appendChild(b);
  });
  scr.appendChild(grid);
};

/* ====================== 覆盖:配对(首错失星,可完成) ====================== */
rMatch = function(scr, s){
  scr.appendChild(el('div','q-title', s.q || '配一配:先点左边,再点它的好朋友!'));
  var wrap = el('div','match-wrap');
  var L = el('div','match-col'), R = el('div','match-col');
  var sel = null, locked = 0;
  shuffle(s.pairs.map(function(p,i){ return {v:p[0], i:i}; })).forEach(function(o){
    var b = el('button','m-item', o.v); b.dataset.i = o.i;
    b.onclick = function(){
      if (b.classList.contains('locked')) return;
      L.querySelectorAll('.m-item').forEach(function(x){ x.classList.remove('sel'); });
      b.classList.add('sel'); sel = b;
    };
    L.appendChild(b);
  });
  shuffle(s.pairs.map(function(p,i){ return {v:p[1], i:i}; })).forEach(function(o){
    var b = el('button','m-item', o.v); b.dataset.i = o.i;
    b.onclick = function(){
      if (b.classList.contains('locked') || !sel) return;
      if (sel.dataset.i === b.dataset.i){
        sel.classList.add('locked'); sel.classList.remove('sel'); b.classList.add('locked');
        fx(true); sel = null; locked++;
        if (locked === s.pairs.length){
          if (!scrFailed){ questionStar(1); }
          else { inlineMsg(scr, '这屏有一次配错,先不加星;到错题本再练一次拿订正星 🌟', '#B3573F'); }
          showNext(scr, '下一题 ➜');
        }
      } else {
        if (!scrFailed) questionFailed(); else extraWrong();
        b.classList.add('wrong'); fx(false);
        setTimeout(function(){ b.classList.remove('wrong'); }, 500);
      }
    };
    R.appendChild(b);
  });
  wrap.appendChild(L); wrap.appendChild(R); scr.appendChild(wrap);
};

/* ====================== 覆盖:排顺序(首错失星,可完成) ====================== */
rOrder = function(scr, s){
  scr.appendChild(el('div','q-title', s.q));
  var line = el('div','order-line');
  var pool = el('div','order-pool');
  var idx = 0;
  shuffle(s.items.map(function(v,i){ return {v:v, i:i}; })).forEach(function(o){
    var b = el('button','chip', o.v);
    b.onclick = function(){
      if (b.classList.contains('used')) return;
      if (o.i === idx){
        b.classList.add('used');
        line.appendChild(el('div','chip placed', o.v));
        fx(true); idx++;
        if (idx === s.items.length){
          if (!scrFailed){ questionStar(1); }
          else { inlineMsg(scr, '这屏有一次排错,先不加星;到错题本再练一次拿订正星 🌟', '#B3573F'); }
          showNext(scr, '下一题 ➜');
        }
      } else {
        if (!scrFailed) questionFailed(); else extraWrong();
        b.classList.add('wrong'); fx(false);
        setTimeout(function(){ b.classList.remove('wrong'); }, 500);
      }
    };
    pool.appendChild(b);
  });
  scr.appendChild(line); scr.appendChild(pool);
};

/* ====================== 覆盖:分拣分类(首错失星,可完成) ====================== */
rSort = function(scr, s){
  scr.appendChild(el('div','q-title', s.q));
  var target = el('div','sort-target', s.target || '🎒');
  var goods = s.items.filter(function(i){ return i.good; }).length;
  var count = el('div','sort-count','0 / ' + goods);
  var pool = el('div','order-pool');
  var hint = el('div','sort-hint','');
  var got = 0;
  shuffle(s.items).forEach(function(it){
    var b = el('button','chip big', it.label);
    b.onclick = function(){
      if (b.classList.contains('gone')) return;
      if (it.good){
        b.classList.add('gone'); fx(true); got++;
        count.textContent = got + ' / ' + goods;
        target.classList.add('pop'); setTimeout(function(){ target.classList.remove('pop'); }, 320);
        if (it.say) speak(it.say.text, it.say.lang);
        if (got === goods){
          hint.textContent = '分类完成啦!'; hint.style.color = '#2F7A47';
          if (!scrFailed){ questionStar(1); }
          else { inlineMsg(scr, '这屏有一次放错,先不加星;到错题本再练一次拿订正星 🌟', '#B3573F'); }
          showNext(scr, '下一题 ➜');
        }
      } else {
        if (!scrFailed) questionFailed(); else extraWrong();
        b.classList.add('wrong'); fx(false);
        hint.textContent = it.hint || '这个不属于这一类哦!';
        setTimeout(function(){ b.classList.remove('wrong'); }, 500);
      }
    };
    pool.appendChild(b);
  });
  scr.appendChild(target); scr.appendChild(count); scr.appendChild(pool); scr.appendChild(hint);
};

/* ---------- 调度表(捕获覆盖后的判错屏 + 原学习屏) ---------- */
var DISPATCH = {
  card:rCard, quiz:rQuiz, match:rMatch, order:rOrder, sort:rSort, blend:rBlend,
  discover:rDiscover, trace:rTrace, rec:rSpeak, book:rBook, challenge:rChallenge
};

/* ---------- 覆盖:showNext(按模式决定前进方向) ---------- */
showNext = function(scr, label){
  if (scr.querySelector('.next-btn')) return;
  var b = el('button','next-btn', label || '下一个 ➜');
  b.onclick = function(){
    if (WRONGMODE){ WQI++; renderWrongScreen(); }
    else { SI++; renderScreen(); }
  };
  scr.appendChild(b);
};

/* ---------- 覆盖:renderScreen(正常闯关 + 每屏重置失星标记) ---------- */
renderScreen = function(){
  var les = M.lessons[LI];
  if (SI >= les.screens.length){ rFinish(); return; }
  var scr = screenShell();
  scrFailed = false;
  var s = les.screens[SI];
  (DISPATCH[s.t] || rCard)(scr, s);
};

/* ---------- 覆盖:rFinish(诚实计分 + 错题本提示 + 入口) ---------- */
rFinish = function(){
  hush();
  var les = M.lessons[LI];
  var max = lessonMax(les);
  var prev = getRec(LI);
  var errs = []; for (var i=0;i<les.screens.length;i++) errs.push(scMist[i]||0);
  var rec = {
    s: Math.max(runStars, prev.s||0), m: max, p: (prev.p||0)+1,
    e: errs.reduce(function(a,b){ return a+b; }, 0), sc: errs,
    d: new Date().toISOString().slice(0,10)
  };
  sset(starKey(LI), JSON.stringify(rec));
  var lw = wbForLesson(M.id, LI);

  var stage = document.getElementById('stage'); stage.innerHTML = '';
  var scr = el('div','screen finish');
  scr.appendChild(el('div','t-emoji big', runStars >= max ? '🏆' : '🎉'));
  scr.appendChild(el('div','q-title','完成「' + les.title + '」!'));
  scr.appendChild(el('div','finish-stars', '⭐'.repeat(Math.max(runStars,1))));
  scr.appendChild(el('div','t-cap','这一关 ' + runStars + ' / ' + max + ' 颗星(只算第一次就答对的)'));
  if (lw > 0){
    var note = el('div','t-cap'); note.style.color = '#B3573F'; note.style.fontSize = '22px'; note.style.fontWeight = '700';
    note.innerHTML = '📒 有 ' + lw + ' 道题进了错题本,去再练一次就能拿到 🌟 订正星!';
    scr.appendChild(note);
  } else {
    var perfect = el('div','t-cap'); perfect.style.color = '#2F7A47'; perfect.style.fontSize = '22px'; perfect.style.fontWeight = '700';
    perfect.textContent = '✨ 全部一次答对,太棒了!';
    scr.appendChild(perfect);
  }
  var row = el('div','btn-row');
  if (lw > 0){ var wb = el('button','next-btn','📒 去错题本'); wb.onclick = startWrongBook; row.appendChild(wb); }
  var again = el('button','next-btn ghost','再玩一次 🔁'); again.onclick = function(){ startLesson(LI); };
  var menu = el('button', 'next-btn' + (lw > 0 ? ' ghost' : ''), '回到选关 ⛺'); menu.onclick = renderMenu;
  row.appendChild(again); row.appendChild(menu);
  scr.appendChild(row);
  stage.appendChild(scr);

  for (var k=0;k<6;k++){
    (function(kk){ setTimeout(function(){
      var st = el('div','star-fly','⭐');
      st.style.left = (10 + Math.random()*80) + 'vw'; st.style.top = '70vh';
      document.body.appendChild(st); setTimeout(function(){ st.remove(); }, 1100);
    }, kk*150); })(k);
  }
  setTimeout(function(){ speak(runStars > 0 ? '太棒了!' : '我们再练一次!', 'zh-CN'); }, 400);
  updateTopStars();
};

/* ====================== 错题本播放器 ====================== */
function startWrongBook(){
  WQ = wbLoad().slice(); WQI = 0; WRONGMODE = true;
  renderWrongScreen();
}
function wrongShell(mod){
  var stage = document.getElementById('stage'); stage.innerHTML = '';
  var tb = document.getElementById('mod-title'); if (tb) tb.textContent = '📒 错题本 · 再练一次';
  document.documentElement.style.setProperty('--accent', mod.accent || '#2563B8');
  var bar = el('div','play-bar');
  var back = el('button','quit-btn','⬅ 大本营'); back.onclick = function(){ WRONGMODE = false; renderHub(); }; bar.appendChild(back);
  var info = el('div','dots'); info.style.fontWeight = '800'; info.style.color = '#8A6100';
  info.textContent = '📒 第 ' + (WQI+1) + ' / ' + WQ.length + ' 题   (' + mod.icon + ' ' + mod.title + ')';
  bar.appendChild(info);
  var rs = el('div','run-stars'); rs.style.color = '#2F7A47'; rs.style.background = '#E7F6EC';
  rs.textContent = '🌟 ' + fixGet(); bar.appendChild(rs);
  stage.appendChild(bar);
  var scr = el('div','screen'); stage.appendChild(scr);
  return scr;
}
function renderWrongScreen(){
  hush();
  if (WQI >= WQ.length){ WRONGMODE = false; renderWrongDone(); return; }
  var qid = WQ[WQI]; var parts = qid.split('|');
  var mod = modById(parts[0]); var li = +parts[1], si = +parts[2];
  var ok = mod && mod.lessons[li] && mod.lessons[li].screens[si] && JUDGE[mod.lessons[li].screens[si].t];
  if (!ok){ wbDel(qid); WQI++; renderWrongScreen(); return; }   // 失效题:移除并跳过
  M = mod; LI = li; SI = si; scrFailed = false;
  var scr = wrongShell(mod);
  var s = mod.lessons[li].screens[si];
  (DISPATCH[s.t] || rCard)(scr, s);
}
function renderWrongDone(){
  hush();
  var stage = document.getElementById('stage'); stage.innerHTML = '';
  var tb = document.getElementById('mod-title'); if (tb) tb.textContent = '📒 错题本';
  var left = wbCount();
  var scr = el('div','screen finish');
  scr.appendChild(el('div','t-emoji big', left ? '💪' : '🎉'));
  scr.appendChild(el('div','q-title', left ? '这一轮错题练完啦!' : '错题本清空,全部掌握!'));
  scr.appendChild(el('div','t-cap', left
    ? ('还剩 ' + left + ' 道题没能一次答对,休息一下再来挑战吧!')
    : '太厉害了!所有错题都一次答对,全部飞走咯 ✨'));
  scr.appendChild(el('div','t-cap','本次共获得 🌟 ' + fixGet() + ' 颗订正星'));
  var row = el('div','btn-row');
  if (left){ var again = el('button','next-btn','📒 再练一轮'); again.onclick = startWrongBook; row.appendChild(again); }
  var home = el('button', 'next-btn' + (left ? ' ghost' : ''), '回到大本营 ⛺'); home.onclick = renderHub; row.appendChild(home);
  scr.appendChild(row); stage.appendChild(scr);
}

/* ====================== 覆盖:学习报告(v5 模式) ====================== */
buildReport = function(){
  var rep = {
    报告类型:'艾伦学前衔接课件 学习报告', 版本:'v5', 孩子:'Alan(艾伦)',
    导出时间:new Date().toLocaleString('zh-CN'),
    说明:'金星=首次即答对(诚实掌握度);订正星=在错题本中一次答对获得;错题本剩余=尚未一次答对的题数。可据此定位薄弱屏型构建下一版。',
    总首次正确星:0, 总满星:0, 总首次正确率:0,
    总订正星:fixGet(), 错题本剩余总数:wbCount(),
    总完成关卡:0, 总关卡:0, 模块:[]
  };
  ALL_MODS.forEach(function(mod){
    var m = { 模块:mod.title, 模块id:mod.id, 关卡:[] };
    mod.lessons.forEach(function(les, i){
      var r = recOf(mod.id, i);
      var max = les.screens.reduce(function(n,s){ return n + (STARRY[s.t]||0); }, 0);
      var lw = wbForLesson(mod.id, i);
      rep.总关卡++; rep.总满星 += max;
      if (r){
        rep.总首次正确星 += (r.s||0);
        if ((r.p||0) > 0) rep.总完成关卡++;
        m.关卡.push({
          关卡:les.title, 首次正确星:(r.s||0), 满星:max,
          首次正确率:max ? +((r.s||0)/max).toFixed(2) : 0,
          错题本剩余:lw, 练习次数:(r.p||0),
          最近一次错误总数:(r.e||0), 每屏错误分布:(r.sc||[]),
          屏型:les.screens.map(function(s){ return s.t; }), 最近游玩日期:(r.d||'')
        });
      } else {
        m.关卡.push({ 关卡:les.title, 首次正确星:0, 满星:max, 首次正确率:0, 错题本剩余:0, 练习次数:0, 状态:'未开始' });
      }
    });
    rep.模块.push(m);
  });
  rep.总首次正确率 = rep.总满星 ? +(rep.总首次正确星 / rep.总满星).toFixed(2) : 0;
  return rep;
};
exportReport = function(){
  var rep = buildReport();
  var txt = JSON.stringify(rep, null, 2);
  var d = new Date();
  var ymd = '' + d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2);
  var name = ymd + '_艾伦学习报告_v5.json';
  var ok = false;
  try{
    var blob = new Blob([txt], {type:'application/json;charset=utf-8'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = name;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 800);
    ok = true;
  }catch(e){}
  showReportModal(txt, name, ok);
};
