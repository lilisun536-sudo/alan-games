<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Alan В· иўӢйј ж•°еӯҰ L5 еӨҮиөӣйҰҶ v1</title>
<style>
:root{
  --cream:#FFF7EA; --paper:#FFFFFF; --ink:#3A3328; --ink2:#7A6F5C;
  --orange:#F08A24; --orange-d:#C96E12; --orange-l:#FFE3C2;
  --teal:#2FA8A0; --teal-d:#1F837C; --teal-l:#D6F3F0;
  --gold:#FFC53D; --gold-d:#E0A415;
  --coral:#FF6B6B; --coral-d:#D94A4A;
  --green:#58B95C; --green-d:#3E9442;
  --line:#EADFC8; --dim:#B9AE99;
  --r:20px; --shadow:0 4px 14px rgba(95,70,20,.10);
  --fd:"Arial Rounded MT Bold","Hiragino Maru Gothic ProN","Yuanti SC","PingFang SC","Microsoft YaHei",ui-rounded,system-ui,sans-serif;
  --fb:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);font-family:var(--fb)}
body{min-height:100vh;background:
  radial-gradient(circle at 12% 8%, #FFEFD2 0 140px, transparent 141px),
  radial-gradient(circle at 88% 92%, #E8F6F0 0 170px, transparent 171px),
  var(--cream);}
button{font-family:inherit;cursor:pointer}
#app{max-width:880px;margin:0 auto;padding:14px 14px 90px}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 2px;flex-wrap:wrap}
.brand{font-family:var(--fd);font-size:22px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.brand .roo{font-size:30px;transform:scaleX(-1)}
.spacer{flex:1}
.iconbtn{border:2px solid var(--line);background:var(--paper);border-radius:14px;padding:8px 12px;font-size:15px;font-weight:700;color:var(--ink);border-bottom-width:5px;transition:transform .06s}
.iconbtn:active{transform:translateY(2px);border-bottom-width:3px}
.iconbtn.on{background:var(--orange-l);border-color:var(--orange)}
/* ---------------- еӨ§еҺ… ---------------- */
.hero{background:linear-gradient(120deg,#FFE9C8,#FFF7EA 60%);border:2px solid var(--line);border-radius:26px;padding:18px 20px;margin:8px 0 16px;display:flex;gap:14px;align-items:center;box-shadow:var(--shadow)}
.hero .big{font-size:46px}
.hero h1{font-family:var(--fd);font-size:24px;margin:0 0 4px}
.hero p{margin:0;color:var(--ink2);font-size:14px;line-height:1.5}
.pouch{margin-left:auto;text-align:center;background:#fff;border:2px solid var(--line);border-radius:18px;padding:10px 14px;min-width:96px}
.pouch .n{font-family:var(--fd);font-size:26px;color:var(--gold-d)}
.pouch .l{font-size:12px;color:var(--ink2)}
.grid7{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.pcard{position:relative;background:var(--paper);border:2px solid var(--line);border-bottom-width:7px;border-radius:var(--r);padding:16px;text-align:left;transition:transform .08s;overflow:hidden}
.pcard:not(.lock):hover{transform:translateY(-2px)}
.pcard:not(.lock):active{transform:translateY(2px);border-bottom-width:3px}
.pcard .yr{font-family:var(--fd);font-size:30px;font-weight:800}
.pcard .nm{font-size:14px;color:var(--ink2);margin:2px 0 10px}
.pcard .meta{display:flex;gap:8px;align-items:center;font-size:13px;font-weight:700}
.tag{padding:3px 10px;border-radius:999px;font-size:12px;font-weight:800}
.pcard.c-orange{border-color:#F4C892;border-bottom-color:#E8A856}.pcard.c-orange .yr{color:var(--orange-d)}.pcard.c-orange .tag{background:var(--orange-l);color:var(--orange-d)}
.pcard.c-teal{border-color:#A8DBD7;border-bottom-color:#7CC6C0}.pcard.c-teal .yr{color:var(--teal-d)}.pcard.c-teal .tag{background:var(--teal-l);color:var(--teal-d)}
.pcard.lock{filter:grayscale(.45);opacity:.75;cursor:not-allowed}
.pcard .ribbon{position:absolute;top:12px;right:-34px;transform:rotate(38deg);background:var(--dim);color:#fff;font-size:11px;font-weight:800;padding:4px 40px;letter-spacing:1px}
.pbar{height:10px;background:#F2EADA;border-radius:99px;margin-top:10px;overflow:hidden}
.pbar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--orange));transition:width .4s}
.startrow{display:flex;gap:6px;margin-top:8px;font-size:15px;min-height:20px;flex-wrap:wrap}
/* ---------------- зӯ”йўҳйЎө ---------------- */
.qtop{display:flex;align-items:center;gap:10px;margin:6px 0 10px;flex-wrap:wrap}
.qback{border:none;background:none;font-size:15px;font-weight:800;color:var(--ink2);padding:6px}
.qprog{flex:1;height:12px;background:#F2EADA;border-radius:99px;overflow:hidden;min-width:120px}
.qprog i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--orange));border-radius:99px;transition:width .35s}
.combo{font-family:var(--fd);font-weight:800;font-size:14px;color:var(--orange-d);background:var(--orange-l);border-radius:999px;padding:4px 12px;animation:pop .3s}
.qcard{background:var(--paper);border:2px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:18px 18px 22px;margin-bottom:14px}
.qhead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.qnum{font-family:var(--fd);font-size:30px;font-weight:800;color:var(--orange-d)}
.qpts{font-size:13px;font-weight:800;color:var(--teal-d);background:var(--teal-l);border-radius:999px;padding:3px 10px}
.qstars{margin-left:auto;font-size:18px;letter-spacing:2px}
.speak{border:2px solid var(--line);border-bottom-width:4px;background:#fff;border-radius:12px;font-size:18px;padding:4px 10px}
.speak:active{transform:translateY(2px)}
.qtext-en{font-size:19px;line-height:1.55;font-weight:700;margin:12px 2px 4px}
.qtext-zh{font-size:16.5px;line-height:1.7;color:#5C5343;margin:2px 2px 4px}
.qfig{margin:14px auto 6px;display:flex;justify-content:center}
.qfig svg{max-width:100%;height:auto}
.opts{display:grid;gap:12px;margin-top:16px}
.opts.text{grid-template-columns:repeat(auto-fit,minmax(110px,1fr))}
.opts.fig{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.opt{position:relative;background:#fff;border:3px solid var(--line);border-bottom-width:7px;border-radius:18px;padding:14px 10px;min-height:64px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:22px;font-weight:800;font-family:var(--fd);color:var(--ink);transition:transform .07s,border-color .15s,background .15s}
.opt svg{max-width:100%;height:auto}
.opt:not([disabled]):hover{border-color:#D9CBAA}
.opt:not([disabled]):active{transform:translateY(3px);border-bottom-width:4px}
.opt .k{position:absolute;top:-10px;left:-8px;width:30px;height:30px;border-radius:50%;background:var(--ink);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:var(--fd)}
.opt.fig{flex-direction:column;padding:18px 10px 12px}
.opt.right{border-color:var(--green);background:#EDF9EE;animation:pop .35s}
.opt.right .k{background:var(--green)}
.opt.wrong{border-color:var(--coral);background:#FFF0F0;animation:shake .4s}
.opt.wrong .k{background:var(--coral)}
.opt.dim{opacity:.45}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes pop{0%{transform:scale(.92)}60%{transform:scale(1.05)}100%{transform:scale(1)}}
.feedback{min-height:34px;margin-top:14px;font-size:18px;font-weight:800;font-family:var(--fd);text-align:center}
.feedback.good{color:var(--green-d)}
.feedback.bad{color:var(--coral-d)}
.nextbar{display:flex;gap:10px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.bigbtn{font-family:var(--fd);font-size:18px;font-weight:800;color:#fff;background:var(--orange);border:none;border-bottom:6px solid var(--orange-d);border-radius:18px;padding:13px 30px;transition:transform .07s}
.bigbtn:active{transform:translateY(3px);border-bottom-width:3px}
.bigbtn.teal{background:var(--teal);border-bottom-color:var(--teal-d)}
.bigbtn.gray{background:#B9AE99;border-bottom-color:#948A77}
/* жҳҹжҳҹзҲҶиЈӮ */
.burst{position:fixed;pointer-events:none;font-size:22px;z-index:99;animation:fly 1s ease-out forwards}
@keyframes fly{to{transform:translate(var(--dx),var(--dy)) rotate(var(--rot)) scale(.4);opacity:0}}
/* ---------------- и®Іи§Јеј№еұӮ ---------------- */
.veil{position:fixed;inset:0;background:rgba(58,51,40,.45);display:flex;align-items:center;justify-content:center;padding:14px;z-index:50}
.modal{background:var(--paper);border-radius:24px;max-width:640px;width:100%;max-height:88vh;overflow:auto;padding:20px;border:2px solid var(--line);box-shadow:0 14px 40px rgba(60,40,0,.25)}
.modal h3{font-family:var(--fd);margin:0 0 8px;font-size:21px;display:flex;align-items:center;gap:8px}
.modal .exfig{display:flex;justify-content:center;margin:10px 0}
.modal .exfig svg{max-width:100%;height:auto}
.modal .ex-en{font-size:15.5px;line-height:1.6;font-weight:600}
.modal .ex-zh{font-size:15px;line-height:1.75;color:#5C5343;margin-top:8px}
.ansline{font-family:var(--fd);font-size:17px;margin:8px 0;color:var(--green-d)}
/* ---------------- з»“з®— / й”ҷйўҳжң¬ / е®¶й•ҝ ---------------- */
.center{text-align:center}
.resultcard{background:var(--paper);border:2px solid var(--line);border-radius:26px;padding:26px;box-shadow:var(--shadow)}
.bign{font-family:var(--fd);font-size:52px;color:var(--orange-d)}
.medal{font-size:64px;animation:pop .5s}
table.ptable{width:100%;border-collapse:collapse;font-size:14px;background:#fff;border-radius:14px;overflow:hidden}
.ptable th,.ptable td{border:1px solid var(--line);padding:7px 8px;text-align:center}
.ptable th{background:var(--orange-l);font-family:var(--fd)}
.ptable td.ok{color:var(--green-d);font-weight:800}
.ptable td.no{color:var(--coral-d);font-weight:800}
textarea.rep{width:100%;height:130px;border:2px solid var(--line);border-radius:12px;font-size:12px;padding:8px;font-family:ui-monospace,monospace}
.note{font-size:13px;color:var(--ink2);line-height:1.6}
.settrow{display:flex;align-items:center;gap:10px;padding:12px 4px;border-bottom:1px dashed var(--line);flex-wrap:wrap}
.settrow .lab{font-weight:800;min-width:120px}
.seg{display:flex;border:2px solid var(--line);border-radius:12px;overflow:hidden}
.seg button{border:none;background:#fff;padding:8px 14px;font-size:14px;font-weight:700;color:var(--ink2)}
.seg button.on{background:var(--orange);color:#fff}
.wrongitem{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--line);border-radius:16px;padding:12px;margin-bottom:10px}
.lockmsg{padding:40px 10px;text-align:center;color:var(--ink2);font-size:15px;line-height:1.8}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
@media (max-width:520px){
  .qtext-en{font-size:17px}.opts.fig{grid-template-columns:repeat(auto-fit,minmax(128px,1fr))}
  .hero{flex-wrap:wrap}.pouch{margin-left:0}
}
:focus-visible{outline:3px solid var(--teal);outline-offset:2px}
</style>
</head>
<body>
<div id="app" role="main"></div>
<script>
"use strict";
/* =====================================================================
   Alan L5 иўӢйј еӨҮиөӣдә’еҠЁиҜҫд»¶ v1 вҖ” з¬¬дёҖжү№:2025 + 2024 дёӯеӣҪеҚ· е…ұ 23 йўҳ
   еӯҳжЎЈеүҚзјҖ alan_l5_ В· е…ЁйғЁеӣҫеҪў SVG/emoji зҹўйҮҸйҮҚз»ҳ В· зӯ”жЎҲз»Ҹе®ҳж–№keyдәӨеҸүйӘҢиҜҒ
===================================================================== */
/* ---------------- еҹәзЎҖе·Ҙе…· ---------------- */
const $=s=>document.querySelector(s);
const APP=document.getElementById('app');
const PFX='alan_l5_';
const store={
  get(k,d){try{const v=localStorage.getItem(PFX+k);return v?JSON.parse(v):d}catch(e){return d}},
  set(k,v){try{localStorage.setItem(PFX+k,JSON.stringify(v))}catch(e){}}
};
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---------------- йҹіж•Ҳ(Web Audio еҗҲжҲҗ,йӣ¶еӨ–йғЁж–Үд»¶) ---------------- */
const Sfx={
  ctx:null, on:true,
  init(){ if(!this.ctx){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(this.ctx&&this.ctx.state==='suspended') this.ctx.resume(); },
  tone(f,t0,dur,type,vol){ if(!this.ctx) return; const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type||'sine'; o.frequency.value=f; o.connect(g); g.connect(this.ctx.destination);
    const t=this.ctx.currentTime+t0; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol||.18,t+.015);
    g.gain.exponentialRampToValueAtTime(.001,t+dur); o.start(t); o.stop(t+dur+.05); },
  ok(){ if(!this.on)return; this.init(); [523,659,784].forEach((f,i)=>this.tone(f,i*.09,.22,'triangle',.2)); },
  combo(){ if(!this.on)return; this.init(); [659,784,988,1319].forEach((f,i)=>this.tone(f,i*.07,.18,'triangle',.2)); this.tone(1568,.3,.3,'sine',.12); },
  bad(){ if(!this.on)return; this.init(); this.tone(196,0,.25,'sawtooth',.10); this.tone(147,.12,.3,'sawtooth',.10); },
  fanfare(){ if(!this.on)return; this.init(); [523,659,784,1047].forEach((f,i)=>this.tone(f,i*.13,.3,'triangle',.2));
    [659,784,988,1319].forEach((f,i)=>this.tone(f,.55+i*.1,.35,'sine',.14)); },
  tap(){ if(!this.on)return; this.init(); this.tone(440,0,.07,'sine',.07); }
};

/* ---------------- иҜӯйҹіжң—иҜ» TTS ---------------- */
const TTS={
  on:true, voices:[],
  load(){ this.voices=window.speechSynthesis?speechSynthesis.getVoices():[]; },
  pick(lang,prefs){ const vs=this.voices; for(const p of prefs){ const v=vs.find(v=>v.lang===p); if(v) return v; }
    return vs.find(v=>v.lang&&v.lang.startsWith(lang))||null; },
  speak(en,zh){ if(!this.on||!window.speechSynthesis) return; speechSynthesis.cancel(); this.load();
    const mode=S.settings.lang, parts=[];
    if(mode!=='zh'&&en) parts.push(['en',en]);
    if(mode!=='en'&&zh) parts.push(['zh',zh]);
    parts.forEach(([lg,txt])=>{ const u=new SpeechSynthesisUtterance(txt);
      if(lg==='en'){ u.lang='en-CA'; const v=this.pick('en',['en-CA','en-US','en-GB']); if(v)u.voice=v; u.rate=.92; }
      else{ u.lang='zh-CN'; const v=this.pick('zh',['zh-CN','zh-TW','zh-HK']); if(v)u.voice=v; u.rate=.95; }
      speechSynthesis.speak(u); }); },
  stop(){ if(window.speechSynthesis) speechSynthesis.cancel(); }
};
if(window.speechSynthesis) speechSynthesis.onvoiceschanged=()=>TTS.load();

/* ---------------- SVG еӣҫеҪўеә“(е…ЁйғЁзҹўйҮҸйҮҚз»ҳ,зӯүд»·дҝқзңҹ) ---------------- */
const NS='http://www.w3.org/2000/svg';
const sv=(w,h,inner,maxw)=>`<svg viewBox="0 0 ${w} ${h}" xmlns="${NS}" style="width:100%;max-width:${maxw||Math.min(w,560)}px" role="img">${inner}</svg>`;
const F={};

/* === 2025 Q1 ж°”зҗғ Г— 6 === */
F.balloons=()=>{
  const cs=['#2FA8A0','#FF6FA5','#F08A24','#58B95C','#9B6BD3','#E84545'];
  let s='';
  cs.forEach((c,i)=>{ const x=44+i*48, y=52+(i%2)*16;
    s+=`<path d="M${x} ${y+34} q${(i%2?8:-8)} 26 0 52" stroke="#B9AE99" fill="none" stroke-width="2"/>
        <ellipse cx="${x}" cy="${y}" rx="22" ry="27" fill="${c}"/>
        <ellipse cx="${x-7}" cy="${y-9}" rx="6" ry="9" fill="#fff" opacity=".45"/>
        <path d="M${x-5} ${y+26} l5 9 5-9z" fill="${c}"/>`; });
  return sv(330,150,s,330);
};
F.balloonsEx=()=>{
  const cs=['#2FA8A0','#FF6FA5','#F08A24','#58B95C','#9B6BD3','#E84545'];
  let s='';
  cs.forEach((c,i)=>{ const x=44+i*48, y=58, gone=i<4;
    s+=`<g opacity="${gone?'.30':'1'}"><ellipse cx="${x}" cy="${y}" rx="22" ry="27" fill="${c}"/>
        <path d="M${x-5} ${y+26} l5 9 5-9z" fill="${c}"/></g>
        ${gone?`<text x="${x}" y="${y+6}" font-size="30" text-anchor="middle">вң–</text>`
              :`<text x="${x}" y="${y-36}" font-size="22" text-anchor="middle">вң”</text>`}`; });
  s+=`<text x="165" y="138" font-size="20" font-weight="800" text-anchor="middle" fill="#3E9442">6 вҲ’ 4 = 2</text>`;
  return sv(330,150,s,330);
};

/* === 2025 Q2 иўӢйј жӢјеӣҫ:ж•ҙеӣҫе…ұз”ЁйғЁд»¶ === */
F.kEars=()=>`
  <g><ellipse cx="56" cy="66" rx="12" ry="25" fill="#F08A24" stroke="#C96E12" stroke-width="2.5" transform="rotate(-34 56 66)"/>
  <ellipse cx="56" cy="68" rx="6" ry="15" fill="#FFCF9E" transform="rotate(-34 56 68)"/>
  <ellipse cx="103" cy="55" rx="14" ry="30" fill="#F08A24" stroke="#C96E12" stroke-width="2.5" transform="rotate(13 103 55)"/>
  <ellipse cx="103" cy="58" rx="7" ry="19" fill="#FFCF9E" transform="rotate(13 103 58)"/></g>`;
F.kEyes=()=>`
  <g><ellipse cx="74" cy="95" rx="9" ry="11" fill="#fff" stroke="#3A3328" stroke-width="2"/>
  <circle cx="76" cy="97" r="4" fill="#3A3328"/>
  <ellipse cx="96" cy="92" rx="9" ry="11" fill="#fff" stroke="#3A3328" stroke-width="2"/>
  <circle cx="94" cy="94" r="4" fill="#3A3328"/></g>`;
F.kHeadFill=()=>`<circle cx="86" cy="129" r="44" fill="#F08A24" stroke="#C96E12" stroke-width="2.5"/>`;
F.kSnout=()=>`
  <path d="M50 116 Q30 116 24 124 Q30 133 52 132 Q60 126 50 116 Z" fill="#F08A24" stroke="#C96E12" stroke-width="2.5"/>
  <ellipse cx="27" cy="123" rx="6.5" ry="5" fill="#7A4A12"/>
  <path d="M58 134 q10 8 22 6" stroke="#C96E12" stroke-width="2.5" fill="none"/>`;
F.kBodyArms=()=>`
  <path d="M86 168 q-26 6 -26 32 l80 0 q4 -34 -18 -42" fill="#F08A24" stroke="#C96E12" stroke-width="2.5"/>
  <path d="M118 132 Q138 110 142 78" stroke="#C96E12" stroke-width="3" fill="none"/>
  <path d="M120 138 Q146 120 150 86" stroke="#F08A24" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path d="M152 70 c-7-10 -22-5 -20 7 c1 8 12 13 20 19 c8-6 19-11 20-19 c2-12 -13-17 -20-7 Z"
        fill="#F08A24" stroke="#C96E12" stroke-width="2.5"/>`;
F.kHeadTop=()=>F.kEars()+`<path d="M52.9 100 A44 44 0 0 1 119.1 100 Z" fill="#F08A24"/><path d="M52.9 100 A44 44 0 0 1 119.1 100" fill="none" stroke="#C96E12" stroke-width="2.5"/>`+F.kEyes();
F.kScene=(missing)=>{
  let inner=`<rect x="0" y="0" width="200" height="200" fill="#fff"/>`+
    F.kBodyArms()+F.kHeadFill()+F.kSnout()+F.kHeadTop();
  if(missing) inner+=`<rect x="0" y="0" width="100" height="100" fill="#fff" stroke="none"/>
    <text x="50" y="70" font-size="52" font-weight="800" text-anchor="middle" fill="#3A3328">?</text>`;
  inner+=`<g stroke="#3A3328" stroke-width="3" fill="none">
    <rect x="1.5" y="1.5" width="197" height="197"/><line x1="100" y1="0" x2="100" y2="200"/><line x1="0" y1="100" x2="200" y2="100"/></g>`;
  return sv(200,200,inner,300);
};
F.kPiece=(v)=>{
  const clip=`<clipPath id="kc${v}"><rect x="0" y="0" width="100" height="100"/></clipPath>`;
  let g='';
  if(v==='E') g=F.kHeadTop();
  if(v==='A') g=`<g transform="translate(2,-17)">${F.kHeadTop()}</g>`;
  if(v==='B') g=`<g transform="translate(100,0) scale(-1,1)">${F.kHeadTop()}</g>`;

F.cubeFig=(name,checker)=>{

F.MAZE={
  sums:[['3 + 4','1 + 6','4 + 2','4 + 3'],['2 + 5','2 + 5','4 + 3','1 + 6'],['5 + 2','6 + 0','7 + 0','6 + 1'],['4 + 3','2 + 3','0 + 7','5 + 2']],
  blocked:[[1,3],[3,2],[4,2]],
  wallsV:[[3,2]], wallsH:[[2,1],[2,4]],
  openL:[1,3], openR:[2,4], openT:[3], openB:[2],
  path:[[1,1],[2,1],[2,2],[2,3],[3,3],[4,3],[4,4]]
};
F.maze=(ex)=>{
  const c=76, M=F.MAZE, W=4*c, H=4*c, sw=6;
  let s='';
  for(let r=1;r<=4;r++)for(let col=1;col<=4;col++){
    const x=(col-1)*c,y=(r-1)*c, blk=M.blocked.some(b=>b[0]===r&&b[1]===col);
    if(ex&&blk) s+=`<rect x="${x+3}" y="${y+3}" width="${c-6}" height="${c-6}" fill="#FFE0E0"/>`;
    s+=`<text x="${x+c/2}" y="${y+c/2+6}" font-size="17.5" font-weight="600" text-anchor="middle" ${ex&&blk?'fill="#D94A4A"':''}>${M.sums[r-1][col-1]}</text>`;
    if(ex&&blk) s+=`<text x="${x+c/2}" y="${y+c-12}" font-size="13" font-weight="800" text-anchor="middle" fill="#D94A4A">вү 7 вң—</text>`;
  }
  const seg=(x1,y1,x2,y2)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#1E1B16" stroke-width="${sw}" stroke-linecap="square"/>`;
  const doorH=(x,y)=>seg(x,y,x+c*0.26,y)+seg(x+c*0.74,y,x+c,y);
  const doorV=(x,y)=>seg(x,y,x,y+c*0.26)+seg(x,y+c*0.74,x,y+c);
  for(let col=1;col<=4;col++){ const x=(col-1)*c;
    s+= M.openT.includes(col)? doorH(x,0):seg(x,0,x+c,0);
    s+= M.openB.includes(col)? doorH(x,H):seg(x,H,x+c,H); }
  for(let r=1;r<=4;r++){ const y=(r-1)*c;
    s+= M.openL.includes(r)? doorV(0,y):seg(0,y,0,y+c);
    s+= M.openR.includes(r)? doorV(W,y):seg(W,y,W,y+c); }
  for(let cb=1;cb<=3;cb++)for(let r=1;r<=4;r++){
    const x=cb*c,y=(r-1)*c, solid=M.wallsV.some(w=>w[0]===cb&&w[1]===r);
    s+= solid? seg(x,y,x,y+c) : doorV(x,y); }
  for(let rb=1;rb<=3;rb++)for(let col=1;col<=4;col++){
    const y=rb*c,x=(col-1)*c, solid=M.wallsH.some(w=>w[0]===rb&&w[1]===col);
    s+= solid? seg(x,y,x+c,y) : doorH(x,y); }
  if(ex){
    const pts=M.path.map(([r,col])=>`${(col-0.5)*c},${(r-0.5)*c}`).join(' ')+` ${4*c+26},${3.5*c}`;
    s+=`<polyline points="${pts}" fill="none" stroke="#3E9442" stroke-width="6" stroke-dasharray="12 8" stroke-linecap="round" opacity=".85" marker-end="url(#arr3)"/>
        <defs><marker id="arr3" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#3E9442"/></marker></defs>`;
  }
  const em=(t,x,y,fs)=>`<text x="${x}" y="${y}" font-size="${fs||30}" text-anchor="middle">${t}</text>`;
  s+=em('рҹ‘§',-26,0.5*c+10)+em('рҹҚҗ',2.5*c,-12,28)+em('рҹҚҺ',W+27,1.5*c+10)+em('рҹҚҠ',-26,2.5*c+10)+em('рҹҚҢ',W+28,3.5*c+10)+em('рҹҘ•',1.5*c,H+30,28);
  return sv(W+110,H+62,`<g transform="translate(52,26)">${s}</g>`,430);
};

/* ---------------- еә”з”ЁзҠ¶жҖҒ ---------------- */
const S={
  screen:'home', paperIdx:0, qIdx:0, tries:0, locked:false, combo:0, mode:'paper', queue:[],
  settings: store.get('settings',{lang:'both', sfx:true, tts:true}),
  prog: store.get('prog',{}),
  wrong: store.get('wrong',[])
};
Sfx.on=S.settings.sfx; TTS.on=S.settings.tts;
const saveAll=()=>{ store.set('settings',S.settings); store.set('prog',S.prog); store.set('wrong',S.wrong); };
const findQ=id=>{ for(const p of PAPERS){ if(p.qs){ const q=p.qs.find(q=>q.id===id); if(q) return q; } } return null; };
const starsOf=p=>p.qs.reduce((s,q)=>s+((S.prog[q.id]||{}).stars||0),0);
const maxStars=p=>p.qs.reduce((s,q)=>s+(q.pts-2),0);
const answered=p=>p.qs.filter(q=>S.prog[q.id]).length;
const totalStars=()=>PAPERS.filter(p=>p.qs).reduce((s,p)=>s+starsOf(p),0);

/* ---------------- жёІжҹ“иҫ…еҠ© ---------------- */
const langBlock=(en,zh,ce,cz)=>{
  const L=S.settings.lang; let s='';
  if(L!=='zh') s+=`<div class="${ce}">${en}</div>`;
  if(L!=='en') s+=`<div class="${cz}">${zh}</div>`;
  return s;
};
const starStr=n=>'вӯҗ'.repeat(n)||'';
function burst(x,y,big){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const ems=big?['вӯҗ','рҹҢҹ','вңЁ','рҹҺү','вӯҗ','рҹҢҹ','вңЁ','рҹҺҠ','вӯҗ','вңЁ']:['вӯҗ','вңЁ','рҹҢҹ','вӯҗ','вңЁ','рҹҢҹ'];
  ems.forEach(e=>{ const el=document.createElement('span'); el.className='burst'; el.textContent=e;
    el.style.left=x+'px'; el.style.top=y+'px';
    el.style.setProperty('--dx',(Math.random()*220-110)+'px');
    el.style.setProperty('--dy',(-60-Math.random()*160)+'px');
    el.style.setProperty('--rot',(Math.random()*360-180)+'deg');
    document.body.appendChild(el); setTimeout(()=>el.remove(),1050); });
}

/* ---------------- еӨ§еҺ… ---------------- */

  const cards=PAPERS.map((p,i)=>{
    if(p.lock) return `<div class="pcard lock" aria-disabled="true">

      <div class="meta"><span class="tag" style="background:#EEE;color:#888">еҚіе°ҶдёҠзәҝ Coming soon</span></div>
      <div class="lockmsg" style="padding:10px 0 0">рҹ”’ йӘҢж”¶з¬¬дёҖжү№еҗҺи§Јй”Ғ</div></div>`;

    return `<button class="pcard ${p.col}" data-act="paper" data-i="${i}">
      <div class="yr">${p.emoji} ${p.yr}</div><div class="nm">${p.nm}</div>

      <div class="startrow" style="color:#7A6F5C;font-size:13px">${st}/${mx} вӯҗ</div></button>`;
  }).join('');
  const wrongN=S.wrong.length;
  APP.innerHTML=`
  <div class="topbar">
    <div class="brand"><span class="roo">рҹҰҳ</span>Alan зҡ„иўӢйј еӨҮиөӣйҰҶ <span style="font-size:12px;color:#B9AE99;font-weight:600">L5 В· v1</span></div>
    <div class="spacer"></div>
    <button class="iconbtn ${wrongN?'on':''}" data-act="wrongbook">рҹ“’ й”ҷйўҳжң¬${wrongN?' '+wrongN:''}</button>
    <button class="iconbtn" data-act="parent">рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘Ұ е®¶й•ҝ</button>
    <button class="iconbtn" data-act="settings">вҡҷпёҸ и®ҫзҪ®</button>
  </div>
  <div class="hero">
    <div class="big">рҹҰҳ</div>
    <div><h1>дҪ еҘҪ,Alan!Hello, Alan!</h1>
      <p>йҖүдёҖеҘ—зңҹйўҳеҚ·ејҖе§Ӣй—Ҝе…іеҗ§!зӯ”еҜ№е°ұжңүжҳҹжҳҹжҺүиҝӣиўӢйј еҸЈиўӢгҖӮ<br>Pick a paper and start hopping вҖ” every correct answer drops stars into the pouch!</p></div>
    <div class="pouch"><div class="n">вӯҗ ${totalStars()}</div><div class="l">еҸЈиўӢйҮҢзҡ„жҳҹжҳҹ</div></div>
  </div>
  <div class="grid7">${cards}</div>
  <p class="note" style="text-align:center;margin-top:18px">з¬¬дёҖжү№:2025 + 2024 дёӯеӣҪеҚ·е…ұ 23 йўҳ В· е…¶дҪҷ 5 еҚ·(43 йўҳ)з¬¬дәҢжү№жӣҙж–° В· иҝӣеәҰиҮӘеҠЁдҝқеӯҳеңЁиҝҷеҸ°и®ҫеӨҮ</p>`;
}

/* ---------------- зӯ”йўҳ ---------------- */
function curPaper(){ return PAPERS[S.paperIdx]; }
function curQ(){ return S.mode==='wrong'? findQ(S.queue[S.qIdx]) : curPaper().qs[S.qIdx]; }
function qTotal(){ return S.mode==='wrong'? S.queue.length : curPaper().qs.length; }

function renderQuiz(){
  S.screen='quiz'; S.tries=0; S.locked=false; TTS.stop();
  const q=curQ(); if(!q){ renderHome(); return; }
  const total=qTotal(), idx=S.qIdx;
  const isFig=q.opts.some(o=>o.f);
  const optHtml=q.opts.map(o=>{
    const inner=o.f?`<span class="k">${o.k}</span>${o.f()}`:`<span class="k">${o.k}</span><span>${esc(o.t)}</span>`;
    return `<button class="opt ${o.f?'fig':''}" data-act="opt" data-k="${o.k}" aria-label="йҖүйЎ№${o.k}">${inner}</button>`;
  }).join('');
  const earned=(S.prog[q.id]||{}).stars||0;
  APP.innerHTML=`
  <div class="qtop">
    <button class="qback" data-act="quitquiz">вҶҗ ${S.mode==='wrong'?'й”ҷйўҳжң¬':'еӨ§еҺ…'}</button>
    <div class="qprog" aria-label="иҝӣеәҰ"><i style="width:${(idx)/total*100}%"></i></div>
    <span style="font-weight:800;color:#7A6F5C;font-size:14px">${idx+1} / ${total}</span>
    ${S.combo>=2?`<span class="combo">рҹ”Ҙ иҝһеҜ№ Г—${S.combo}</span>`:''}
  </div>
  <div class="qcard">
    <div class="qhead">
      <span class="qnum">${S.mode==='wrong'?'рҹ“’ ':''}Q${q.n}</span>
      <span class="qpts">${q.pts} еҲҶ вҶ’ ${'вӯҗ'.repeat(q.pts-2)}</span>
      <button class="speak" data-act="speak" title="иҜ»йўҳ Read aloud">рҹ”Ҡ</button>
      <span class="qstars">${starStr(earned)}</span>
    </div>
    ${langBlock(esc(q.en),esc(q.zh),'qtext-en','qtext-zh')}
    ${q.figTop?`<div class="qfig">${q.figTop()}</div>`:''}
    ${q.fig&&q.fig()?`<div class="qfig">${q.fig()}</div>`:''}
    <div class="opts ${isFig?'fig':'text'}">${optHtml}</div>
    <div class="feedback" id="fb" aria-live="polite"></div>
    <div class="nextbar" id="nb"></div>
  </div>`;
  if(S.settings.tts) setTimeout(()=>TTS.speak(q.en,q.zh),350);
}

function onOpt(btn){
  if(S.locked) return;
  const q=curQ(), k=btn.dataset.k, fb=$('#fb'), nb=$('#nb');
  if(k===q.ans){
    S.locked=true;
    btn.classList.add('right');
    document.querySelectorAll('.opt').forEach(b=>{ if(b!==btn) b.classList.add('dim'); b.disabled=true; });
    const first=S.tries===0;
    const stars=first?(q.pts-2):1;
    const prev=S.prog[q.id]||{};
    S.prog[q.id]={a:S.tries+1, r:first?'first':'second', stars:Math.max(stars,prev.stars||0), wrong:prev.wrong||[], t:Date.now()};
    if(first){ S.combo++; if(S.combo>=3) Sfx.combo(); else Sfx.ok(); }
    else { S.combo=0; Sfx.ok(); }
    if(S.mode==='wrong'&&first){ S.wrong=S.wrong.filter(id=>id!==q.id); }
    saveAll();
    const r=btn.getBoundingClientRect();
    burst(r.left+r.width/2, r.top+r.height/2, first&&q.pts===5);
    fb.className='feedback good';
    fb.textContent= first? `еӨӘжЈ’дәҶ!Correct! +${stars} вӯҗ${S.combo>=3?'  рҹ”ҘиҝһеҜ№ Г—'+S.combo:''}` : `зӯ”еҜ№е•Ұ!Got it! +1 вӯҗ`;
    nb.innerHTML=`<button class="bigbtn gray" data-act="explain">рҹ’Ў зңӢи®Іи§Ј</button>
      <button class="bigbtn" data-act="next">${S.qIdx+1>=qTotal()?'рҹҸҒ е®ҢжҲҗ':'дёӢдёҖйўҳ Next вҶ’'}</button>`;
  }else{
    S.tries++;
    btn.classList.add('wrong'); btn.disabled=true;
    Sfx.bad();
    const prev=S.prog[q.id]||{a:0,wrong:[]};
    prev.wrong=(prev.wrong||[]).concat(k);
    if(S.tries===1){
      S.prog[q.id]=Object.assign({},S.prog[q.id]||{},{wrong:prev.wrong});
      fb.className='feedback bad'; fb.textContent='еҶҚжғідёҖжғі,иҜ•дёҖж¬Ў!Not yet вҖ” try once more! рҹ’Ә';
      setTimeout(()=>btn.classList.remove('wrong'),450); btn.classList.add('dim');
    }else{
      S.locked=true; S.combo=0;
      S.prog[q.id]={a:2, r:'fail', stars:S.prog[q.id]&&S.prog[q.id].r&&S.prog[q.id].r!=='fail'?S.prog[q.id].stars:0, wrong:prev.wrong, t:Date.now()};
      if(!S.wrong.includes(q.id)) S.wrong.push(q.id);
      saveAll();
      document.querySelectorAll('.opt').forEach(b=>{ b.disabled=true; if(b.dataset.k===q.ans) b.classList.add('right'); else if(!b.classList.contains('wrong')) b.classList.add('dim'); });
      fb.className='feedback bad'; fb.textContent=`жӯЈзЎ®зӯ”жЎҲжҳҜ ${q.ans}гҖӮдёҖиө·зңӢзңӢдёәд»Җд№Ҳеҗ§!`;
      nb.innerHTML=`<button class="bigbtn" data-act="next">${S.qIdx+1>=qTotal()?'рҹҸҒ е®ҢжҲҗ':'дёӢдёҖйўҳ Next вҶ’'}</button>`;
      setTimeout(openExplain,650);
    }
  }
}

/* ---------------- и®Іи§Јеј№еұӮ ---------------- */
function openExplain(){
  const q=curQ(); if(!q) return;
  const ansOpt=q.opts.find(o=>o.k===q.ans);
  const ansShow=ansOpt&&ansOpt.t?` вҖ” ${esc(ansOpt.t)}`:'';
  const veil=document.createElement('div');
  veil.className='veil'; veil.id='veil';
  veil.innerHTML=`<div class="modal" role="dialog" aria-label="и®Іи§Ј">
    <h3>рҹ’Ў Q${q.n} еҲҶжӯҘеӣҫи§Ј <button class="speak" data-act="speakex" style="margin-left:auto">рҹ”Ҡ</button></h3>
    <div class="ansline">вң“ жӯЈзЎ®зӯ”жЎҲ Answer:${q.ans}${ansShow}</div>
    ${q.exFig?`<div class="exfig">${q.exFig()}</div>`:''}
    ${langBlock(esc(q.exEn),esc(q.exZh),'ex-en','ex-zh')}
    <div class="nextbar" style="margin-top:16px"><button class="bigbtn teal" data-act="closeveil">жҳҺзҷҪе•Ұ Got it!</button></div>
  </div>`;
  veil.addEventListener('click',e=>{ if(e.target===veil) closeVeil(); });
  document.body.appendChild(veil);
}
function closeVeil(){ const v=$('#veil'); if(v) v.remove(); TTS.stop(); }

function nextQ(){
  closeVeil(); TTS.stop();
  if(S.qIdx+1>=qTotal()){ S.mode==='wrong'? renderWrongDone() : renderResults(); }
  else{ S.qIdx++; renderQuiz(); }
}

/* ---------------- з»“з®— ---------------- */
function renderResults(){
  S.screen='results'; const p=curPaper();
  const st=starsOf(p), mx=maxStars(p);
  const firsts=p.qs.filter(q=>(S.prog[q.id]||{}).r==='first').length;
  const fails=p.qs.filter(q=>(S.prog[q.id]||{}).r==='fail').length;
  const medal= firsts===p.qs.length?'рҹҸҶ': fails===0?'рҹҘҲ':'рҹҺ–пёҸ';
  const word= firsts===p.qs.length?'е…ЁйғЁдёҖж¬Ўзӯ”еҜ№!ж»ЎеҲҶиўӢйј !Perfect hop!': fails===0?'е…ЁйғЁзӯ”еҜ№!зңҹеҺүе®і!All correct!':'й—Ҝе…іе®ҢжҲҗ!з»§з»ӯеҠ жІ№!Paper complete!';
  Sfx.fanfare(); setTimeout(()=>burst(innerWidth/2,180,true),250);
  APP.innerHTML=`
  <div class="resultcard center" style="margin-top:30px">
    <div class="medal">${medal}</div>
    <h2 style="font-family:var(--fd);margin:8px 0">${p.yr} еҚ·е®ҢжҲҗ!</h2>
    <p style="font-size:17px;font-weight:700">${word}</p>
    <div class="bign">вӯҗ ${st} <span style="font-size:22px;color:#B9AE99">/ ${mx}</span></div>
    <p class="note">дёҖж¬Ўзӯ”еҜ№ ${firsts} йўҳ В· з¬¬дәҢж¬Ўзӯ”еҜ№ ${p.qs.length-firsts-fails} йўҳ В· йңҖиҰҒеҶҚз»ғ ${fails} йўҳ</p>
    <div class="nextbar" style="margin-top:14px">
      ${S.wrong.some(id=>id.startsWith(p.id))?'<button class="bigbtn teal" data-act="wrongbook">рҹ“’ й”ҷйўҳеҶҚз»ғ</button>':''}
      <button class="bigbtn" data-act="home">рҹҸ  еӣһеӨ§еҺ…</button>
    </div>
  </div>`;
}
function renderWrongDone(){
  Sfx.fanfare();
  APP.innerHTML=`<div class="resultcard center" style="margin-top:40px">
    <div class="medal">рҹ§№вңЁ</div><h2 style="font-family:var(--fd)">й”ҷйўҳз»ғе®Ңе•Ұ!</h2>
    <p class="note">дёҖж¬Ўзӯ”еҜ№зҡ„йўҳе·Із»Ҹд»Һй”ҷйўҳжң¬йҮҢйЈһиө°е’ҜгҖӮ</p>
    <div class="nextbar"><button class="bigbtn" data-act="home">рҹҸ  еӣһеӨ§еҺ…</button>
    ${S.wrong.length?'<button class="bigbtn teal" data-act="wrongbook">рҹ“’ иҝҳжңү '+S.wrong.length+' йўҳ</button>':''}</div></div>`;
}

/* ---------------- й”ҷйўҳжң¬ ---------------- */
function renderWrongbook(){
  S.screen='wrong'; TTS.stop();
  const items=S.wrong.map(id=>{ const q=findQ(id); if(!q) return '';
    const p=PAPERS.find(p=>p.id===q.paper);
    return `<div class="wrongitem"><span style="font-family:var(--fd);font-size:18px;font-weight:800;color:#C96E12">${p.yr} В· Q${q.n}</span>
      <span style="flex:1;font-size:14px;color:#5C5343">${esc((S.settings.lang==='en'?q.en:q.zh).slice(0,40))}вҖҰ</span>
      <span class="tag" style="background:#FFE3C2;color:#C96E12">${q.pts}еҲҶ</span></div>`; }).join('');
  APP.innerHTML=`
  <div class="topbar"><button class="qback" data-act="home">вҶҗ еӨ§еҺ…</button><div class="brand">рҹ“’ й”ҷйўҳжң¬</div></div>
  ${S.wrong.length?`
    <p class="note">иҝҷдәӣйўҳдёҠж¬ЎжІЎжңүе®Ңе…Ёзӯ”еҜ№гҖӮеҶҚз»ғдёҖйҒҚ,дёҖж¬Ўзӯ”еҜ№е°ұжҠҠе®ғд»Һжң¬еӯҗйҮҢж“ҰжҺү!</p>
    ${items}
    <div class="nextbar"><button class="bigbtn" data-act="wrongstart">рҹҡҖ ејҖе§ӢеҶҚз»ғ(${S.wrong.length} йўҳ)</button></div>`
   :`<div class="lockmsg">рҹҺү й”ҷйўҳжң¬жҳҜз©әзҡ„,еӨӘжЈ’дәҶ!<br>еҺ»еӨ§еҺ…еҶҚеҲ·дёҖеҘ—еҚ·еҗ§гҖӮ</div>
    <div class="nextbar"><button class="bigbtn" data-act="home">рҹҸ  еӣһеӨ§еҺ…</button></div>`}`;
}

/* ---------------- е®¶й•ҝжЁЎејҸ + еҜјеҮәжҠҘе‘Ҡ ---------------- */
function buildReport(){
  const qrows=[]; 
  PAPERS.filter(p=>p.qs).forEach(p=>p.qs.forEach(q=>{ const g=S.prog[q.id]||null;
    qrows.push({id:q.id, paper:p.yr, n:q.n, pts:q.pts, answer:q.ans,
      result:g?g.r:null, stars:g?g.stars:0, attempts:g?g.a:0, wrongPicks:g?(g.wrong||[]):[], ts:g?g.t:null}); }));
  const done=qrows.filter(r=>r.result);
  return {version:'alan_l5_v1', batch:'з¬¬дёҖжү№ 2025+2024 е…ұ23йўҳ', exportedAt:new Date().toISOString(),
    settings:S.settings,
    totals:{stars:totalStars(), answered:done.length, of:qrows.length,
      firstTry:done.filter(r=>r.result==='first').length,
      secondTry:done.filter(r=>r.result==='second').length,
      fail:done.filter(r=>r.result==='fail').length},
    wrongbook:S.wrong.slice(), questions:qrows};
}
function renderParent(){
  S.screen='parent'; TTS.stop();
  const rows=PAPERS.filter(p=>p.qs).map(p=>p.qs.map(q=>{ const g=S.prog[q.id];
    const stat=!g?'вҖ”': g.r==='first'?'вң“ дёҖж¬Ўзӯ”еҜ№': g.r==='second'?'вң“ дәҢж¬Ўзӯ”еҜ№':'вң— еҫ…е·©еӣә';
    const cls=!g?'': g.r==='fail'?'no':'ok';
    const wrongs=g&&g.wrong&&g.wrong.length?` <span style="color:#B9AE99">(иҜҜйҖү ${g.wrong.join(',')})</span>`:'';
    return `<tr><td>${p.yr}</td><td>Q${q.n}</td><td>${q.pts}</td><td><b>${q.ans}</b></td><td class="${cls}">${stat}${wrongs}</td><td>${starStr(g?g.stars:0)}</td></tr>`;
  }).join('')).join('');
  const rep=JSON.stringify(buildReport(),null,2);
  APP.innerHTML=`
  <div class="topbar"><button class="qback" data-act="home">вҶҗ еӨ§еҺ…</button><div class="brand">рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘Ұ е®¶й•ҝжЁЎејҸ</div></div>
  <p class="note">зӯ”жЎҲжҖ»иЎЁ(е®ҳж–№ key дәӨеҸүйӘҢиҜҒ)дёҺ Alan зҡ„дҪңзӯ”и®°еҪ•гҖӮеҜјеҮә JSON еҗҺеҸ‘еӣһз»ҷ Claude,еҸҜеҒҡзІҫеҮҶж°ҙе№іеҲҶжһҗгҖӮ</p>
  <div style="overflow:auto"><table class="ptable">
    <tr><th>еҚ·</th><th>йўҳеҸ·</th><th>еҲҶеҖј</th><th>зӯ”жЎҲ</th><th>Alan дҪңзӯ”</th><th>еҫ—жҳҹ</th></tr>${rows}</table></div>
  <div class="nextbar" style="margin:16px 0 10px">
    <button class="bigbtn" data-act="dl">в¬ҮпёҸ дёӢиҪҪеӯҰд№ жҠҘе‘Ҡ JSON</button>
    <button class="bigbtn teal" data-act="copy">рҹ“Ӣ еӨҚеҲ¶жҠҘе‘Ҡ</button>
  </div>
  <textarea class="rep" id="repbox" readonly>${esc(rep)}</textarea>
  <p class="note">ж–Үд»¶еҗҚ:alan_l5_report_ж—Ҙжңҹ.json В· д№ҹеҸҜзӣҙжҺҘе…ЁйҖүж–Үжң¬жЎҶеҶ…е®№зІҳиҙҙз»ҷ ClaudeгҖӮ</p>`;
}
function dlReport(){
  const rep=JSON.stringify(buildReport(),null,2);
  const d=new Date(), pad=n=>String(n).padStart(2,'0');
  const fn=`alan_l5_report_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([rep],{type:'application/json'})); a.download=fn;
  document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},300);
}
function copyReport(){
  const box=$('#repbox'); box.select(); box.setSelectionRange(0,999999);
  try{ navigator.clipboard?navigator.clipboard.writeText(box.value):document.execCommand('copy'); alert('е·ІеӨҚеҲ¶!еҸҜзӣҙжҺҘзІҳиҙҙз»ҷ ClaudeгҖӮ'); }
  catch(e){ alert('иҜ·жүӢеҠЁе…ЁйҖүж–Үжң¬жЎҶеҗҺеӨҚеҲ¶гҖӮ'); }
}

/* ---------------- и®ҫзҪ® ---------------- */
function renderSettings(){
  S.screen='settings'; TTS.stop();
  const L=S.settings.lang;
  APP.innerHTML=`
  <div class="topbar"><button class="qback" data-act="home">вҶҗ еӨ§еҺ…</button><div class="brand">вҡҷпёҸ и®ҫзҪ®</div></div>
  <div class="qcard">
    <div class="settrow"><span class="lab">иҜӯиЁҖ Language</span>
      <div class="seg">
        <button class="${L==='both'?'on':''}" data-act="lang" data-v="both">еҸҢиҜӯ</button>
        <button class="${L==='en'?'on':''}" data-act="lang" data-v="en">English</button>
        <button class="${L==='zh'?'on':''}" data-act="lang" data-v="zh">дёӯж–Ү</button>
      </div></div>
    <div class="settrow"><span class="lab">йҹіж•Ҳ Sound</span>
      <button class="iconbtn ${S.settings.sfx?'on':''}" data-act="sfx">${S.settings.sfx?'рҹ”” ејҖ':'рҹ”• е…і'}</button></div>
    <div class="settrow"><span class="lab">иҮӘеҠЁиҜ»йўҳ TTS</span>
      <button class="iconbtn ${S.settings.tts?'on':''}" data-act="tts">${S.settings.tts?'рҹ—ЈпёҸ ејҖ':'рҹӨҗ е…і'}</button>
      <span class="note">иӢұж–Ү en-CA дјҳе…Ҳ,е…¶ж¬Ўдёӯж–Ү</span></div>
    <div class="settrow"><span class="lab">ж•°жҚ® Data</span>
      <button class="iconbtn" data-act="reset">рҹ—‘пёҸ жё…з©әе…ЁйғЁиҝӣеәҰ</button>
      <span class="note">иҝӣеәҰдҝқеӯҳеңЁжң¬жңәжөҸи§ҲеҷЁ(еүҚзјҖ alan_l5_)</span></div>
  </div>`;
}

/* ---------------- дәӢд»¶е§”жүҳ ---------------- */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-act]'); if(!t) return;
  const act=t.dataset.act; Sfx.init();
  if(act==='paper'){ Sfx.tap(); S.paperIdx=+t.dataset.i; S.mode='paper'; S.qIdx=0; renderQuiz(); }
  else if(act==='opt') onOpt(t);
  else if(act==='next') nextQ();
  else if(act==='explain'){ Sfx.tap(); openExplain(); }
  else if(act==='closeveil') closeVeil();
  else if(act==='home'){ Sfx.tap(); renderHome(); }
  else if(act==='quitquiz'){ TTS.stop(); S.mode==='wrong'?renderWrongbook():renderHome(); }
  else if(act==='wrongbook'){ Sfx.tap(); renderWrongbook(); }
  else if(act==='wrongstart'){ S.mode='wrong'; S.queue=S.wrong.slice(); S.qIdx=0; renderQuiz(); }
  else if(act==='parent'){ Sfx.tap(); renderParent(); }
  else if(act==='settings'){ Sfx.tap(); renderSettings(); }
  else if(act==='lang'){ S.settings.lang=t.dataset.v; saveAll(); renderSettings(); }
  else if(act==='sfx'){ S.settings.sfx=!S.settings.sfx; Sfx.on=S.settings.sfx; saveAll(); renderSettings(); }
  else if(act==='tts'){ S.settings.tts=!S.settings.tts; TTS.on=S.settings.tts; if(!TTS.on)TTS.stop(); saveAll(); renderSettings(); }
  else if(act==='reset'){ if(confirm('зЎ®е®ҡжё…з©ә Alan зҡ„е…ЁйғЁиҝӣеәҰдёҺй”ҷйўҳжң¬еҗ—?жӯӨж“ҚдҪңдёҚеҸҜжҒўеӨҚгҖӮ')){ S.prog={}; S.wrong=[]; S.combo=0; saveAll(); alert('е·Іжё…з©әгҖӮ'); renderHome(); } }
  else if(act==='dl') dlReport();
  else if(act==='copy') copyReport();
  else if(act==='speak'){ const q=curQ(); if(q) TTS.speak(q.en,q.zh); }
  else if(act==='speakex'){ const q=curQ(); if(q) TTS.speak(q.exEn,q.exZh); }
});

/* ---------------- еҗҜеҠЁ ---------------- */
renderHome();
</script>
